<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClassBot | Classtech</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #007bff; --bg: #1e1e1e; --sidebar: #121212; --card: #2d2d2d; --white: #ffffff; }
        * { box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body, html { margin: 0; padding: 0; height: 100vh; background: var(--bg); color: var(--white); display: flex; overflow: hidden; }

        /* Login Overlay */
        #login-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .auth-box { width: 85%; max-width: 300px; text-align: center; }
        .auth-input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #444; background: #121212; color: white; outline: none; }

        /* Sidebar */
        #sidebar { width: 260px; background: var(--sidebar); display: flex; flex-direction: column; border-right: 1px solid #333; transition: 0.3s; }
        .new-chat { margin: 15px; padding: 12px; border: 1px solid #444; border-radius: 8px; cursor: pointer; text-align: center; font-weight: 600; transition: 0.2s; }
        .new-chat:hover { background: #222; }
        
        #chat-list { flex: 1; overflow-y: auto; padding: 0 10px; }
        .chat-item { padding: 10px; margin-bottom: 5px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #ccc; }
        .chat-item:hover, .chat-item.active { background: #2d2d2d; color: white; }

        .user-footer { padding: 15px; border-top: 1px solid #333; font-size: 0.8rem; display: flex; justify-content: space-between; align-items: center; }

        /* Main Chat Area */
        #main { flex: 1; display: flex; flex-direction: column; position: relative; }
        header { padding: 15px 20px; font-weight: 700; color: var(--primary); border-bottom: 1px solid #333; display: flex; align-items: center; }
        
        #messages { flex: 1; overflow-y: auto; padding: 40px 15% 20px 15%; display: flex; flex-direction: column; gap: 20px; }
        .msg { max-width: 90%; padding: 10px 5px; font-size: 15px; line-height: 1.6; }
        .user { align-self: flex-start; font-weight: 600; border-left: 3px solid var(--primary); padding-left: 15px; }
        .ai { align-self: flex-start; padding-left: 18px; }

        #input-area { padding: 20px 15% 40px 15%; }
        .box { display: flex; background: var(--card); border-radius: 15px; padding: 10px 15px; border: 1px solid #444; }
        input[type="text"] { flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 16px; }
        #sendBtn { background: var(--primary); border: none; color: white; width: 35px; height: 35px; border-radius: 8px; cursor: pointer; }

        @media (max-width: 768px) { #sidebar { display: none; } #messages, #input-area { padding: 20px; } }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="auth-box">
            <h2 style="color: var(--primary)">ClassBot</h2>
            <input type="text" id="userLogin" class="auth-input" placeholder="Usuário">
            <input type="password" id="passLogin" class="auth-input" placeholder="Senha">
            <button onclick="entrar()" style="width:100%; padding:12px; background:var(--primary); border:none; border-radius:8px; color:white; font-weight:600; cursor:pointer;">Entrar</button>
            <button onclick="cadastrar()" style="background:none; border:none; color:#888; margin-top:15px; cursor:pointer; font-size:0.8rem;">Criar conta</button>
        </div>
    </div>

    <aside id="sidebar">
        <div class="new-chat" onclick="novaConversa()">+ Nova conversa</div>
        <div id="chat-list"></div>
        <div class="user-footer">
            <span id="user-display"></span>
            <span onclick="sair()" style="color:#ff4444; cursor:pointer;">Sair</span>
        </div>
    </aside>

    <main id="main">
        <header>ClassBot</header>
        <div id="messages"></div>
        <div id="input-area">
            <div class="box">
                <input type="text" id="userInput" placeholder="Manda a real..." autocomplete="off">
                <button id="sendBtn">↑</button>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, get, child, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB0vSCE32XEg0IL6LaRzmlvfa3qj1priPg",
            authDomain: "classbot-807d8.firebaseapp.com",
            databaseURL: "https://classbot-807d8-default-rtdb.firebaseio.com/",
            projectId: "classbot-807d8",
            storageBucket: "classbot-807d8.firebasestorage.app",
            messagingSenderId: "117494419469",
            appId: "1:117494419469:web:ca12637334e9a7d8090544"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let usuario = localStorage.getItem("cb_user") || null;
        let conversaAtivaId = null;
        let historico = [];

        if (usuario) {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('user-display').textContent = usuario;
            listarConversas();
        }

        // --- AUTH ---
        window.entrar = async () => {
            const u = document.getElementById('userLogin').value.trim().toLowerCase();
            const p = document.getElementById('passLogin').value;
            const snap = await get(ref(db, `usuarios/${u}`));
            if (snap.exists() && snap.val().senha === p) {
                usuario = u;
                localStorage.setItem("cb_user", u);
                location.reload();
            } else alert("Erro!");
        };

        window.cadastrar = async () => {
            const u = document.getElementById('userLogin').value.trim().toLowerCase();
            const p = document.getElementById('passLogin').value;
            await set(ref(db, `usuarios/${u}`), { senha: p });
            alert("Conta criada!");
        };

        window.sair = () => { localStorage.clear(); location.reload(); };

        // --- CONVERSAS ---
        async function listarConversas() {
            const snap = await get(ref(db, `conversas/${usuario}`));
            const list = document.getElementById('chat-list');
            list.innerHTML = "";
            if (snap.exists()) {
                Object.keys(snap.val()).reverse().forEach(id => {
                    const div = document.createElement('div');
                    div.className = `chat-item ${id === conversaAtivaId ? 'active' : ''}`;
                    div.textContent = snap.val()[id][0]?.content || "Conversa vazia";
                    div.onclick = () => abrirConversa(id);
                    list.appendChild(div);
                });
            }
        }

        window.novaConversa = () => {
            conversaAtivaId = null;
            historico = [];
            document.getElementById('messages').innerHTML = '<div class="msg ai">Nova conversa iniciada. O que manda?</div>';
            listarConversas();
        };

        async function abrirConversa(id) {
            conversaAtivaId = id;
            const snap = await get(ref(db, `conversas/${usuario}/${id}`));
            if (snap.exists()) {
                historico = snap.val();
                document.getElementById('messages').innerHTML = "";
                historico.forEach(m => addMsg(m.content, m.role));
                listarConversas();
            }
        }

        async function enviar() {
            const text = document.getElementById('userInput').value.trim();
            if (!text || !usuario) return;

            if (!conversaAtivaId) {
                conversaAtivaId = push(ref(db, `conversas/${usuario}`)).key;
            }

            addMsg(text, 'user');
            document.getElementById('userInput').value = '';
            historico.push({ role: "user", content: text });

            const aiMsg = addMsg("...", 'ai');

            try {
                const response = await fetch("/api/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ mensagens: historico.slice(-6) })
                });
                const data = await response.json();
                aiMsg.textContent = data.answer;
                historico.push({ role: "assistant", content: data.answer });
                
                await set(ref(db, `conversas/${usuario}/${conversaAtivaId}`), historico);
                listarConversas();
            } catch (e) { aiMsg.textContent = "Erro!"; }
        }

        function addMsg(t, r) {
            const d = document.createElement("div");
            d.className = `msg ${r === 'user' ? 'user' : 'ai'}`;
            d.textContent = (r === 'user' ? 'Você: ' : '') + t;
            const m = document.getElementById("messages");
            m.appendChild(d);
            m.scrollTop = m.scrollHeight;
            return d;
        }

        document.getElementById('sendBtn').onclick = enviar;
        document.getElementById('userInput').onkeypress = (e) => { if(e.key === 'Enter') enviar(); };
    </script>
</body>
</html>
