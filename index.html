<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ClassBot AI</title>
    <style>
        :root { --bg: #222; --card: #2d2d2d; --txt: #e3e3e3; --accent: #19c37d; }
        * { box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100vh; background: var(--bg); color: var(--txt); overflow: hidden; display: flex; flex-direction: column; }
        header { padding: 15px; text-align: center; border-bottom: 1px solid #333; font-weight: bold; background: #252525; color: var(--accent); }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; padding-bottom: 100px; }
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 15px; line-height: 1.5; white-space: pre-wrap; }
        .user { align-self: flex-end; background: #005fb8; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: var(--card); border: 1px solid #3d3d3d; border-bottom-left-radius: 2px; }
        #input-area { position: fixed; bottom: 0; width: 100%; background: var(--bg); padding: 15px; border-top: 1px solid #333; }
        .box { max-width: 800px; margin: 0 auto; display: flex; background: #333; border-radius: 30px; padding: 5px 15px; align-items: center; }
        input { flex: 1; background: transparent; border: none; color: white; padding: 12px; outline: none; font-size: 16px; }
        button { background: var(--accent); border: none; color: white; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 20px; }
    </style>
</head>
<body>
    <header>ClassBot</header>
    <div id="messages">
        <div class="msg ai">E ai manda, to aq pra te ajudar</div>
    </div>
    <div id="input-area">
        <div class="box">
            <input type="text" id="userInput" placeholder="Manda a real..." autocomplete="off">
            <button id="sendBtn">↑</button>
        </div>
    </div>

    <script>
        let historico = []; // A memória da conversa

        async function enviar() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;

            addMsg(text, 'user');
            input.value = '';
            
            historico.push({ role: "user", content: text });

            const aiMsg = addMsg("...", 'ai');
            scrollDown();

            try {
                const response = await fetch("/api/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ mensagens: historico }) // Envia o histórico completo
                });
                
                const data = await response.json();
                
                if (data.answer) {
                    aiMsg.innerText = data.answer;
                    historico.push({ role: "assistant", content: data.answer });
                } else {
                    aiMsg.innerText = "Erro ao processar.";
                }
            } catch (e) {
                aiMsg.innerText = "Erro de conexão.";
            }
            scrollDown();
        }

        function addMsg(t, s) {
            const d = document.createElement("div");
            d.className = `msg ${s}`;
            d.innerText = t;
            document.getElementById("messages").appendChild(d);
            return d;
        }

        function scrollDown() {
            const m = document.getElementById("messages");
            m.scrollTop = m.scrollHeight;
        }

        document.getElementById('sendBtn').onclick = enviar;
        document.getElementById('userInput').onkeypress = (e) => { if(e.key === 'Enter') enviar(); };
    </script>
</body>
</html>
