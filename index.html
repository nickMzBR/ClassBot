<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClassBot - Real Search</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: #222;
            color: #e3e3e3;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 90%;
            max-width: 500px;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #4facfe, #00f2fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .chat-mimic {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 30px;
            border: 1px solid #333;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        /* Barra de Input estilo Gemini */
        .input-area {
            background: #303030;
            border-radius: 30px;
            padding: 8px 15px;
            display: flex;
            align-items: center;
            border: 1px solid #444;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 12px;
            font-size: 1rem;
            outline: none;
        }

        button {
            background: #4facfe;
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>ClassBot</h1>
        
        <div class="chat-mimic">
            🤖 <b>ClassBot:</b> Eu estou pronto! Digite sua pesquisa abaixo e eu abrirei os melhores resultados do Google para você.
        </div>

        <div class="input-area">
            <input type="text" id="searchQuery" placeholder="O que quer pesquisar?" onkeypress="handleKey(event)">
            <button onclick="fazerBusca()">➤</button>
        </div>
    </div>

    <script>
        function handleKey(e) {
            if (e.key === 'Enter') {
                fazerBusca();
            }
        }

        function fazerBusca() {
            const query = document.getElementById('searchQuery').value;
            if (query.trim() !== "") {
                // Redireciona para o Google com a pesquisa
                window.location.href = "https://www.google.com/search?q=" + encodeURIComponent(query);
            }
        }
    </script>

</body>
</html>
