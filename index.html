<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatGPT Style IA</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <style>
        :root {
            --bg-color: #343541;
            --sidebar-color: #202123;
            --user-msg: #343541;
            --ai-msg: #444654;
            --text-color: #ececf1;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); color: var(--text-color); }
        
        #container { display: flex; height: 100vh; }

        /* Sidebar */
        #sidebar { width: 260px; background-color: var(--sidebar-color); padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .new-chat { border: 1px solid #4d4d4f; padding: 10px; border-radius: 5px; font-size: 14px; text-align: center; cursor: pointer; }

        /* Chat Area */
        #chat-main { flex: 1; display: flex; flex-direction: column; position: relative; }
        #messages { flex: 1; overflow-y: auto; padding-bottom: 150px; }
        
        .message { padding: 25px 20%; display: flex; gap: 20px; line-height: 1.6; }
        .user { background-color: var(--user-msg); }
        .ai { background-color: var(--ai-msg); border-bottom: 1px solid rgba(0,0,0,0.1); }
        
        .avatar { width: 30px; height: 30px; border-radius: 2px; display: flex; align-items: center; justify-content: center; font-weight: bold; flex-shrink: 0; }
        .user .avatar { background: #5436da; }
        .ai .avatar { background: #19c37d; }

        /* Input Area */
        #input-area { position: absolute; bottom: 0; width: 100%; padding: 20px 0; background-image: linear-gradient(180deg,rgba(52,53,65,0),#343541 50%); }
        .input-box { width: 60%; margin: 0 auto; position: relative; }
        input { width: 100%; background: #40414f; border: 1px solid #303139; color: white; padding: 14px; border-radius: 8px; box-shadow: 0 0 15px rgba(0,0,0,0.1); outline: none; }
    </style>
</head>
<body>

<div id="container">
    <div id="sidebar">
        <div class="new-chat">+ New Chat</div>
        <div style="font-size: 12px; color: #8e8ea0; margin-top: 20px;">Histórico (Local)</div>
    </div>

    <div id="chat-main">
        <div id="messages">
            <div class="message ai">
                <div class="avatar">AI</div>
                <div class="content" id="status-text">Estou carregando meus neurônios... aguarde um momento.</div>
            </div>
        </div>

        <div id="input-area">
            <div class="input-box">
                <input type="text" id="userInput" placeholder="Envie uma temperatura em Celsius..." onkeypress="handleEnter(event)" disabled>
            </div>
        </div>
    </div>
</div>

<script>
    // --- LÓGICA DA IA (TensorFlow.js) ---
    const model = tf.sequential();
    model.add(tf.layers.dense({ units: 1, inputShape: [1] }));
    model.compile({ loss: 'meanSquaredError', optimizer: 'sgd' });

    const xs = tf.tensor2d([-40, -10, 0, 8, 15, 22, 38], [7, 1]);
    const ys = tf.tensor2d([-40, 14, 32, 46.4, 59, 71.6, 100.4], [7, 1]);

    async function treinarIA() {
        await model.fit(xs, ys, { epochs: 500 });
        document.getElementById('status-text').innerText = "Olá! Sou uma IA treinada localmente. Digite um valor em Celsius e eu converterei para Fahrenheit para você.";
        document.getElementById('userInput').disabled = false;
    }

    function addMessage(text, sender) {
        const div = document.createElement('div');
        div.className = `message ${sender}`;
        div.innerHTML = `
            <div class="avatar">${sender === 'user' ? 'U' : 'AI'}</div>
            <div class="content">${text}</div>
        `;
        const container = document.getElementById('messages');
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    function handleEnter(e) {
        if (e.key === 'Enter') {
            const input = document.getElementById('userInput');
            const valor = parseFloat(input.value);
            
            if (!isNaN(valor)) {
                addMessage(`${valor}°C`, 'user');
                processar(valor);
                input.value = '';
            }
        }
    }

    function processar(celsius) {
        const resultado = tf.tidy(() => {
            const inputTensor = tf.tensor2d([celsius], [1, 1]);
            return model.predict(inputTensor).dataSync()[0];
        });

        setTimeout(() => {
            addMessage(`Com base no meu treinamento, ${celsius}°C é aproximadamente **${resultado.toFixed(2)}°F**.`, 'ai');
        }, 500);
    }

    treinarIA();
</script>

</body>
</html>
