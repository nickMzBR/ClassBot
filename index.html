<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClassBot Oficial</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #222; color: #e3e3e3; font-family: sans-serif; display: flex; justify-content: center; height: 100vh; }
        .main { width: 100%; max-width: 600px; display: flex; flex-direction: column; position: relative; }
        .header { padding: 20px; font-size: 1.5em; font-weight: bold; color: #4facfe; text-align: center; }
        .chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; padding-bottom: 100px; }
        .msg { padding: 12px; border-radius: 15px; max-width: 85%; line-height: 1.4; }
        .bot { background: #1a1a1a; align-self: flex-start; border-bottom-left-radius: 2px; }
        .user { background: #303030; align-self: flex-end; border-bottom-right-radius: 2px; }
        .input-area { position: absolute; bottom: 20px; width: 90%; left: 5%; background: #333; border-radius: 30px; display: flex; padding: 5px; border: 1px solid #444; }
        input { flex: 1; background: transparent; border: none; color: white; padding: 10px 15px; outline: none; }
        button { background: #4facfe; border: none; color: white; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; }
        .loading { font-size: 0.8em; color: #888; margin-left: 20px; display: none; }
    </style>
</head>
<body>

<div class="main">
    <div class="header">ClassBot</div>
    <div id="chat" class="chat-box">
        <div class="msg bot">Olá! Eu sou o ClassBot. Digite o que você quer saber e eu vou pesquisar agora.</div>
    </div>
    <div id="loader" class="loading">ClassBot pesquisando na web...</div>
    <div class="input-area">
        <input type="text" id="pergunta" placeholder="Digite sua dúvida...">
        <button onclick="buscar()">➤</button>
    </div>
</div>

<script>
    async function buscar() {
        const input = document.getElementById('pergunta');
        const chat = document.getElementById('chat');
        const loader = document.getElementById('loader');
        const texto = input.value.trim();

        if (!texto) return;

        // Mostrar mensagem do usuário
        chat.innerHTML += `<div class="msg user">${texto}</div>`;
        input.value = "";
        loader.style.display = "block";
        chat.scrollTop = chat.scrollHeight;

        try {
            // Usando uma API de busca livre para o ClassBot funcionar no celular
            const response = await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(texto)}&format=json&no_html=1`);
            const data = await response.json();
            
            loader.style.display = "none";
            let resposta = data.AbstractText || "Encontrei resultados, mas são muitos links. Tente ser mais específico na pergunta!";
            
            if (!data.AbstractText && data.RelatedTopics.length > 0) {
                resposta = data.RelatedTopics[0].Text;
            }

            chat.innerHTML += `<div class="msg bot"><b>Resultado da pesquisa:</b><br>${resposta}</div>`;
        } catch (e) {
            loader.style.display = "none";
            chat.innerHTML += `<div class="msg bot">Erro ao conectar com a rede.</div>`;
        }
        chat.scrollTop = chat.scrollHeight;
    }
</script>

</body>
</html>
