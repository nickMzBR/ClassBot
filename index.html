<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClassBot v6 - Resumo Real</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #222; color: #e3e3e3; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; }
        .header { padding: 20px; font-size: 1.5em; font-weight: bold; color: #4facfe; text-align: center; border-bottom: 1px solid #333; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 12px 16px; border-radius: 20px; max-width: 85%; line-height: 1.5; font-size: 16px; }
        .bot { background: #1a1a1a; align-self: flex-start; border: 1px solid #333; border-bottom-left-radius: 2px; }
        .user { background: #333; align-self: flex-end; border: 1px solid #444; border-bottom-right-radius: 2px; }
        .input-container { background: #1a1a1a; padding: 15px; border-top: 1px solid #333; }
        .input-area { background: #333; border-radius: 25px; display: flex; padding: 5px 5px 5px 15px; border: 1px solid #4facfe; align-items: center; max-width: 600px; margin: 0 auto; }
        input { flex: 1; background: transparent; border: none; color: white; padding: 12px 0; outline: none; font-size: 16px; }
        button { background: #4facfe; border: none; color: white; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .loader { font-size: 0.8em; color: #4facfe; text-align: center; display: none; padding: 5px; }
    </style>
</head>
<body>

    <div class="header">🤖 ClassBot</div>
    <div id="chat">
        <div class="msg bot">Olá! Agora eu vou ler o conteúdo e te dar um resumo. O que quer pesquisar?</div>
    </div>
    <div id="loading" class="loader">ClassBot lendo e resumindo...</div>

    <div class="input-container">
        <div class="input-area">
            <input type="text" id="pergunta" placeholder="Ex: Alan Turing">
            <button onclick="buscar()">➤</button>
        </div>
    </div>

<script>
    async function buscar() {
        const input = document.getElementById('pergunta');
        const chat = document.getElementById('chat');
        const loader = document.getElementById('loading');
        const query = input.value.trim();

        if (!query) return;

        chat.innerHTML += `<div class="msg user">${query}</div>`;
        input.value = "";
        loader.style.display = "block";
        chat.scrollTop = chat.scrollHeight;

        try {
            // 1. Primeiro buscamos o título correto na Wikipedia
            const searchUrl = `https://pt.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(query)}&format=json&origin=*`;
            const searchRes = await fetch(searchUrl);
            const searchData = await searchRes.json();

            if (searchData.query.search.length > 0) {
                const titulo = searchData.query.search[0].title;
                
                // 2. Agora pegamos o resumo (extract) desse título
                const contentUrl = `https://pt.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(titulo.replace(/ /g, '_'))}`;
                const contentRes = await fetch(contentUrl);
                const contentData = await contentRes.json();

                loader.style.display = "none";
                const resposta = contentData.extract 
                    ? `<b>${contentData.title}:</b> ${contentData.extract}` 
                    : "Encontrei o tema, mas não consegui resumir o texto.";
                
                chat.innerHTML += `<div class="msg bot">${resposta}</div>`;
            } else {
                loader.style.display = "none";
                chat.innerHTML += `<div class="msg bot">Não encontrei nada sobre isso.</div>`;
            }
        } catch (e) {
            loader.style.display = "none";
            chat.innerHTML += `<div class="msg bot">Erro ao conectar. Tente novamente!</div>`;
        }
        chat.scrollTop = chat.scrollHeight;
    }

    document.getElementById('pergunta').addEventListener('keypress', (e) => { if(e.key === 'Enter') buscar(); });
</script>

</body>
</html>
