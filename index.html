<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ClassBot</title>
    <style>
        :root { --bg: #222; --card: #2d2d2d; --txt: #e3e3e3; --accent: #19c37d; }
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; height: 100vh; background: var(--bg); color: var(--txt); font-family: sans-serif; overflow: hidden; }
        
        /* Barra de Carregamento */
        #loader-screen { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.5s; }
        .progress-bar { width: 70%; height: 6px; background: #333; border-radius: 10px; overflow: hidden; margin-top: 15px; }
        #progress { width: 0%; height: 100%; background: linear-gradient(90deg, #4285f4, var(--accent)); transition: 0.3s; }

        #app { display: flex; flex-direction: column; height: 100%; }
        header { padding: 15px; text-align: center; border-bottom: 1px solid #333; color: var(--accent); font-weight: bold; font-size: 1.2rem; }
        
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; padding-bottom: 100px; }
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 15px; line-height: 1.5; }
        .user { align-self: flex-end; background: #005fb8; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: var(--card); border: 1px solid #3d3d3d; border-bottom-left-radius: 2px; }

        /* Input Inteligente */
        #input-area { position: fixed; bottom: 0; width: 100%; background: var(--bg); padding: 15px; border-top: 1px solid #333; }
        .box { max-width: 800px; margin: 0 auto; display: flex; background: #333; border-radius: 30px; padding: 5px 15px; align-items: center; }
        input { flex: 1; background: transparent; border: none; color: white; padding: 12px; outline: none; font-size: 16px; }
        button { background: var(--accent); border: none; color: white; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 20px; }
    </style>
</head>
<body>

    <div id="loader-screen">
        <h3 id="load-text">Sincronizando ClassBot...</h3>
        <div class="progress-bar"><div id="progress"></div></div>
    </div>

    <div id="app">
        <header>ClassBot</header>
        <div id="messages">
            <div class="msg ai">Opa! Sou o <b>ClassBot</b>. Minha base de conhecimento foi atualizada. Como posso te ajudar hoje?</div>
        </div>

        <div id="input-area">
            <div class="box">
                <input type="text" id="userInput" placeholder="Perqunte qualquer coisa...">
                <button onclick="enviar()">↑</button>
            </div>
        </div>
    </div>

    <script>
        // Simulação de carregamento de banco de dados inteligente
        window.onload = () => {
            let p = 0;
            let interval = setInterval(() => {
                p += Math.random() * 20;
                document.getElementById('progress').style.width = p + '%';
                if (p >= 100) {
                    clearInterval(interval);
                    document.getElementById('loader-screen').style.opacity = '0';
                    setTimeout(() => document.getElementById('loader-screen').style.display = 'none', 500);
                }
            }, 200);
        };

        // Cérebro de Conhecimento Geral (Expansível)
        const brain = {
            "roblox": "O Roblox Studio usa Luau. Para seu jogo de mineração, você vai precisar de um sistema de 'DataStore' para salvar os minérios dos jogadores.",
            "fluentgo": "O FluentGo deve focar na experiência do usuário. Como a logo é azul e branca, o app deve seguir um estilo 'Clean Tech'.",
            "ia": "Inteligência Artificial é a simulação de processos humanos por máquinas. Eu, por exemplo, processo seus comandos localmente!",
            "quem é você": "Eu sou o ClassBot, sua IA pessoal focada em desenvolvimento e produtividade.",
            "ajuda": "Eu posso te ajudar a codar, dar ideias para o seu jogo de mineração ou conversar sobre design!"
        };

        async function enviar() {
            const input = document.getElementById("userInput");
            const text = input.value.trim();
            if (!text) return;

            addMsg(text, 'user');
            input.value = "";
            
            const aiMsg = addMsg("Analisando...", 'ai');

            // Simula processamento "inteligente"
            setTimeout(() => {
                aiMsg.innerText = gerarResposta(text);
                scrollDown();
            }, 700);
        }

        function gerarResposta(t) {
            const txt = t.toLowerCase();
            for (let chave in brain) {
                if (txt.includes(chave)) return brain[chave];
            }
            return `Entendi sobre '${t}'. Como ClassBot, eu recomendaria integrar essa ideia ao seu projeto de mineração no Roblox ou no FluentGo. O que acha?`;
        }

        function addMsg(t, s) {
            const d = document.createElement("div");
            d.className = `msg ${s}`;
            d.innerText = t;
            document.getElementById("messages").appendChild(d);
            scrollDown();
            return d;
        }

        function scrollDown() {
            const m = document.getElementById("messages");
            m.scrollTop = m.scrollHeight;
        }

        // Ajuste teclado mobile (O fim dos bugs)
        window.visualViewport.addEventListener('resize', () => {
            document.body.style.height = window.visualViewport.height + 'px';
            scrollDown();
        });
    </script>
</body>
</html>
