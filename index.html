<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ClassBot Xenova</title>
    <style>
        :root { --bg: #222; --card: #2d2d2d; --txt: #e3e3e3; --accent: #19c37d; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body, html { margin: 0; padding: 0; height: 100vh; background: var(--bg); color: var(--txt); overflow: hidden; }

        /* Tela de Carregamento */
        #loader { 
            position: fixed; inset: 0; background: var(--bg); z-index: 100; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        .progress-container { width: 70%; background: #333; height: 8px; border-radius: 10px; margin-top: 20px; overflow: hidden; }
        #bar { width: 0%; height: 100%; background: var(--accent); transition: width 0.3s; }

        #app { display: flex; flex-direction: column; height: 100%; }
        header { padding: 15px; text-align: center; border-bottom: 1px solid #333; color: var(--accent); font-weight: bold; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; padding-bottom: 100px; }
        
        .msg { max-width: 85%; padding: 12px; border-radius: 15px; font-size: 15px; line-height: 1.5; }
        .user { align-self: flex-end; background: #005fb8; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: var(--card); border: 1px solid #3d3d3d; border-bottom-left-radius: 2px; }

        #input-area { position: fixed; bottom: 0; width: 100%; background: var(--bg); padding: 15px; border-top: 1px solid #333; }
        .box { max-width: 800px; margin: 0 auto; display: flex; background: #333; border-radius: 30px; padding: 5px 15px; }
        input { flex: 1; background: transparent; border: none; color: white; padding: 12px; outline: none; }
        button { background: var(--accent); border: none; color: white; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body>

    <div id="loader">
        <h3 id="status">Carregando Inteligência...</h3>
        <div class="progress-container"><div id="bar"></div></div>
        <p style="font-size: 12px; color: #777; margin-top: 10px;">Isso só acontece na primeira vez (aprox. 30MB)</p>
    </div>

    <div id="app">
        <header>ClassBot Xenova</header>
        <div id="messages">
            <div class="msg ai">Olá! Sou o **ClassBot**. Eu rodo totalmente no seu dispositivo via Xenova. Como posso ajudar?</div>
        </div>
        <div id="input-area">
            <div class="box">
                <input type="text" id="userInput" placeholder="Mande uma mensagem...">
                <button id="sendBtn">↑</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1';

        let chatbot;
        const bar = document.getElementById('bar');
        const status = document.getElementById('status');

        // Inicializa o modelo de forma leve (usando o Qwen-0.5B ou similar)
        async function init() {
            try {
                chatbot = await pipeline('text-generation', 'Xenova/Qwen1.5-0.5B-Chat', {
                    progress_callback: (p) => {
                        if (p.status === 'progress') {
                            bar.style.width = p.progress + '%';
                            status.innerText = `Baixando cérebro: ${Math.round(p.progress)}%`;
                        }
                    }
                });
                document.getElementById('loader').style.display = 'none';
            } catch (e) {
                status.innerText = "Erro ao carregar no celular. Tente usar o Chrome.";
                console.error(e);
            }
        }

        async function enviar() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text || !chatbot) return;

            addMsg(text, 'user');
            input.value = '';
            const aiMsg = addMsg("Pensando...", 'ai');

            // Gerar resposta generativa real
            const output = await chatbot(text, { 
                max_new_tokens: 100,
                temperature: 0.7,
                do_sample: true
            });

            aiMsg.innerText = output[0].generated_text.replace(text, "").trim();
            scrollDown();
        }

        function addMsg(t, s) {
            const d = document.createElement("div");
            d.className = `msg ${s}`;
            d.innerText = t;
            document.getElementById("messages").appendChild(d);
            scrollDown();
            return d;
        }

        function scrollDown() {
            const m = document.getElementById("messages");
            m.scrollTop = m.scrollHeight;
        }

        document.getElementById('sendBtn').onclick = enviar;
        init();
    </script>
</body>
</html>
