<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ClassBot AI</title>
    <style>
        :root { --bg: #222; --card: #2d2d2d; --txt: #e3e3e3; --accent: #19c37d; }
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; height: 100vh; background: var(--bg); color: var(--txt); font-family: sans-serif; overflow: hidden; }
        
        #loader-screen { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.5s; }
        .progress-bar { width: 70%; height: 6px; background: #333; border-radius: 10px; overflow: hidden; margin-top: 15px; }
        #progress { width: 0%; height: 100%; background: linear-gradient(90deg, #4285f4, var(--accent)); transition: 0.2s; }

        #app { display: flex; flex-direction: column; height: 100%; }
        header { padding: 15px; text-align: center; border-bottom: 1px solid #333; color: var(--accent); font-weight: bold; }
        
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; padding-bottom: 120px; }
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 15px; line-height: 1.5; white-space: pre-wrap; }
        .user { align-self: flex-end; background: #005fb8; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: var(--card); border: 1px solid #3d3d3d; border-bottom-left-radius: 2px; }

        #input-area { position: fixed; bottom: 0; width: 100%; background: var(--bg); padding: 15px; border-top: 1px solid #333; }
        .box { max-width: 800px; margin: 0 auto; display: flex; background: #333; border-radius: 30px; padding: 5px 15px; align-items: center; }
        input { flex: 1; background: transparent; border: none; color: white; padding: 12px; outline: none; font-size: 16px; }
        button { background: var(--accent); border: none; color: white; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body>

    <div id="loader-screen">
        <h3>ClassBot Generativo</h3>
        <div class="progress-bar"><div id="progress"></div></div>
    </div>

    <div id="app">
        <header>ClassBot</header>
        <div id="messages">
            <div class="msg ai">Olá! Agora sou uma **IA Generativa de verdade**. Posso conversar sobre qualquer assunto, resolver problemas e criar textos. O que vamos fazer hoje?</div>
        </div>

        <div id="input-area">
            <div class="box">
                <input type="text" id="userInput" placeholder="Converse com o ClassBot...">
                <button onclick="enviar()">↑</button>
            </div>
        </div>
    </div>

    <script>
        // Barra de carregamento
        window.onload = () => {
            let p = 0;
            let interval = setInterval(() => {
                p += 20;
                document.getElementById('progress').style.width = p + '%';
                if (p >= 100) {
                    clearInterval(interval);
                    document.getElementById('loader-screen').style.opacity = '0';
                    setTimeout(() => document.getElementById('loader-screen').style.display = 'none', 500);
                }
            }, 100);
        };

        // CONFIGURAÇÃO DA IA (LLM)
        const API_KEY = "COLOQUE_SUA_CHAVE_AQUI"; // Pegue em console.groq.com

        async function chamarIA(prompt) {
            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            {role: "system", content: "Você é o ClassBot, uma IA generativa inteligente, amigável e prestativa. Responda sempre em Português do Brasil."},
                            {role: "user", content: prompt}
                        ],
                        temperature: 0.7
                    })
                });
                const data = await response.json();
                return data.choices[0].message.content;
            } catch (error) {
                return "Erro ao conectar com meu cérebro. Verifique se a API Key está correta!";
            }
        }

        async function enviar() {
            const input = document.getElementById("userInput");
            const texto = input.value.trim();
            if (!texto) return;

            addMsg(texto, 'user');
            input.value = "";
            
            const aiMsg = addMsg("ClassBot está digitando...", 'ai');
            scrollDown();

            const resposta = await chamarIA(texto);
            aiMsg.innerText = resposta;
            scrollDown();
        }

        function addMsg(t, s) {
            const d = document.createElement("div");
            d.className = `msg ${s}`;
            d.innerText = t;
            document.getElementById("messages").appendChild(d);
            scrollDown();
            return d;
        }

        function scrollDown() {
            const m = document.getElementById("messages");
            m.scrollTop = m.scrollHeight;
        }

        // Ajuste teclado mobile
        window.visualViewport?.addEventListener('resize', () => {
            document.body.style.height = window.visualViewport.height + 'px';
            scrollDown();
        });
    </script>
</body>
</html>
