<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sala do futuro</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #007bff; 
            --bg: #222; 
            --card: #2d2d2d; 
            --white: #ffffff;
            --txt: #e3e3e3;
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        * { box-sizing: border-box; font-family: 'Montserrat', sans-serif; -webkit-tap-highlight-color: transparent; }

        body, html { 
            margin: 0; padding: 0; height: 100vh; 
            background: var(--bg); color: var(--white); 
            display: flex; flex-direction: column;
        }

        header { 
            padding: 18px; text-align: center; background: #1a1a1a; 
            color: var(--primary); font-weight: 700; font-size: 1.2rem;
            box-shadow: var(--shadow); z-index: 10; border-bottom: 1px solid #333;
        }

        header span { color: #888; font-weight: 400; font-size: 0.8rem; margin-left: 5px; }

        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }

        .msg { 
            max-width: 85%; padding: 14px 18px; border-radius: 20px; font-size: 15px; 
            line-height: 1.6; position: relative; box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            word-wrap: break-word;
            white-space: pre-wrap; /* ESSENCIAL PARA OS ESPAÇOS */
        }

        .user { align-self: flex-end; background: var(--primary); color: var(--white); border-bottom-right-radius: 4px; }

        .ai { align-self: flex-start; background: var(--card); color: var(--white); border: 1px solid #3d3d3d; border-bottom-left-radius: 4px; }

        #input-area { padding: 20px; background: linear-gradient(transparent, var(--bg)); }

        .box { 
            max-width: 700px; margin: 0 auto; display: flex; 
            background: var(--card); border-radius: 50px; 
            padding: 8px 10px 8px 22px; align-items: center;
            box-shadow: var(--shadow); border: 1px solid #444;
        }

        input { flex: 1; background: transparent; border: none; color: var(--white); outline: none; font-size: 16px; }

        button { 
            background: var(--primary); border: none; color: white; 
            width: 45px; height: 45px; border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }

        button:active { transform: scale(0.95); }

        #messages::-webkit-scrollbar { width: 5px; }
        #messages::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }
    </style>
</head>
<body>
    <header>ClassBot<span>by Classtech</span></header>
    
    <div id="messages">
        <div class="msg ai">Estou aqui para te ajudar</div>
    </div>

    <div id="input-area">
        <div class="box">
            <input type="text" id="userInput" placeholder="Peça ao ClassBot" autocomplete="off">
            <button id="sendBtn">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
            </button>
        </div>
    </div>

    <script>
        let historico = [];

        function digitarTexto(elemento, texto) {
            let i = 0;
            elemento.textContent = ""; // Limpa os "..."
            
            function tipo() {
                if (i < texto.length) {
                    elemento.textContent += texto.charAt(i); // textContent preserva espaços perfeitamente
                    i++;
                    scrollDown();
                    setTimeout(tipo, 12); // Velocidade de digitação
                }
            }
            tipo();
        }

        async function enviar() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;

            addMsg(text, 'user');
            input.value = '';
            
            historico.push({ role: "user", content: text });

            const aiMsg = addMsg("...", 'ai');
            scrollDown();

            try {
                const response = await fetch("/api/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ mensagens: historico })
                });
                
                const data = await response.json();
                
                if (data.answer) {
                    digitarTexto(aiMsg, data.answer);
                    historico.push({ role: "assistant", content: data.answer });
                } else {
                    aiMsg.textContent = "Erro no servidor. Tenta de novo.";
                }
            } catch (e) {
                aiMsg.textContent = "Sem conexão. Verifica sua internet.";
            }
        }

        function addMsg(t, s) {
            const d = document.createElement("div");
            d.className = `msg ${s}`;
            d.textContent = t;
            document.getElementById("messages").appendChild(d);
            return d;
        }

        function scrollDown() {
            const m = document.getElementById("messages");
            m.scrollTop = m.scrollHeight;
        }

        document.getElementById('sendBtn').onclick = enviar;
        document.getElementById('userInput').onkeypress = (e) => { if(e.key === 'Enter') enviar(); };
    </script>
</body>
</html>
