<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gemini Clone Local</title>
    <style>
        :root { --bg: #131314; --card: #1e1f20; --txt: #e3e3e3; --accent: #4285f4; }
        
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--txt); font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* Barra de Progresso de Instalação */
        #progress-container { position: fixed; top: 0; left: 0; width: 100%; height: 4px; background: #333; z-index: 1000; display: none; }
        #progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #4285f4, #34a853, #fbbc05, #ea4335); transition: width 0.3s; }

        #chat-container { display: flex; flex-direction: column; height: 100vh; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 15px; font-size: 15px; line-height: 1.5; word-wrap: break-word; }
        .user { align-self: flex-end; background: #303132; color: white; border-bottom-right-radius: 4px; }
        .ai { align-self: flex-start; background: var(--card); border-bottom-left-radius: 4px; border: 1px solid #333; }

        #input-area { padding: 15px; background: var(--bg); border-top: 1px solid #333; }
        .box { max-width: 600px; margin: 0 auto; display: flex; background: #28292a; border-radius: 25px; padding: 5px 15px; align-items: center; }
        input { flex: 1; background: transparent; border: none; color: white; padding: 12px; outline: none; font-size: 16px; }
        button { background: var(--accent); border: none; color: white; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; font-weight: bold; }
        button:disabled { background: #555; }

        #status-label { font-size: 10px; text-align: center; color: #888; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div id="progress-container">
        <div id="progress-bar"></div>
    </div>

    <div id="chat-container">
        <div id="messages">
            <div class="msg ai">Olá! Sou sua IA Generativa local. Digite algo abaixo para começar a baixar meu modelo (recomendo usar Wi-Fi).</div>
        </div>

        <div id="input-area">
            <div id="status-label">Pronto para iniciar</div>
            <div class="box">
                <input type="text" id="userInput" placeholder="Digite sua pergunta...">
                <button id="sendBtn" onclick="handleSend()">↑</button>
            </div>
        </div>
    </div>

    <script type="module">
        import * as webllm from "https://esm.run/@mlc-ai/web-llm";

        const messagesContainer = document.getElementById("messages");
        const progressBar = document.getElementById("progress-bar");
        const progressContainer = document.getElementById("progress-container");
        const statusLabel = document.getElementById("status-label");
        const userInput = document.getElementById("userInput");
        const sendBtn = document.getElementById("sendBtn");

        // Modelo leve (Gemma-2b) para baixar mais rápido em celulares
        const selectedModel = "Gemma-2b-it-q4f32_1-MLC";
        let engine;

        async function initEngine() {
            if (engine) return;
            
            progressContainer.style.display = "block";
            sendBtn.disabled = true;
            
            engine = await webllm.CreateMLCEngine(selectedModel, {
                initProgressCallback: (report) => {
                    // O report.progress vai de 0 a 1
                    const percent = Math.round(report.progress * 100);
                    progressBar.style.width = percent + "%";
                    statusLabel.innerText = report.text; // Mostra o que está baixando
                    
                    if (percent >= 100) {
                        setTimeout(() => {
                            progressContainer.style.display = "none";
                            statusLabel.innerText = "IA Online";
                        }, 1000);
                    }
                }
            });
            sendBtn.disabled = false;
        }

        window.handleSend = async function() {
            const text = userInput.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            userInput.value = "";
            
            const aiMsgDiv = addMessage("Carregando modelo e processando...", 'ai');

            try {
                await initEngine(); // Garante que a IA iniciou
                
                const messages = [{ role: "user", content: text }];
                const chunks = await engine.chat.completions.create({ messages, stream: true });
                
                let responseText = "";
                for await (const chunk of chunks) {
                    const content = chunk.choices[0]?.delta?.content || "";
                    responseText += content;
                    aiMsgDiv.innerText = responseText;
                    messagesContainer.scrollTop = messagesContainer.scrollHeight;
                }
            } catch (e) {
                aiMsgDiv.innerText = "Erro: WebGPU não suportado ou memória insuficiente.";
                console.error(e);
            }
        }

        function addMessage(text, sender) {
            const div = document.createElement("div");
            div.className = `msg ${sender}`;
            div.innerText = text;
            messagesContainer.appendChild(div);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            return div;
        }
    </script>
</body>
</html>
