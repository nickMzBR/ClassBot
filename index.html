<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ClassBot Lite</title>
    <style>
        :root { --bg: #222; --card: #2d2d2d; --txt: #e3e3e3; --accent: #19c37d; }
        * { box-sizing: border-box; font-family: sans-serif; }
        
        body, html { 
            margin: 0; padding: 0; height: 100vh; 
            background: var(--bg); color: var(--txt); 
            overflow: hidden; display: flex; flex-direction: column;
        }

        /* Tela de Carregamento Otimizada */
        #loader { 
            position: fixed; inset: 0; background: var(--bg); z-index: 1000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        .progress-box { width: 70%; max-width: 250px; background: #333; height: 6px; border-radius: 10px; margin-top: 15px; overflow: hidden; }
        #bar { width: 0%; height: 100%; background: var(--accent); transition: width 0.1s; }
        #status { font-size: 14px; color: var(--accent); font-weight: bold; text-align: center; padding: 0 20px; }

        header { padding: 15px; text-align: center; border-bottom: 1px solid #333; font-weight: bold; }

        #messages { 
            flex: 1; overflow-y: auto; padding: 20px; 
            display: flex; flex-direction: column; gap: 12px;
            padding-bottom: 90px; 
        }
        
        .msg { max-width: 85%; padding: 10px 14px; border-radius: 15px; font-size: 15px; line-height: 1.4; }
        .user { align-self: flex-end; background: #005fb8; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: var(--card); border: 1px solid #3d3d3d; border-bottom-left-radius: 2px; }

        #input-area { 
            position: fixed; bottom: 0; width: 100%; 
            background: var(--bg); padding: 10px 15px;
            border-top: 1px solid #333;
        }
        .box { 
            max-width: 600px; margin: 0 auto; display: flex; 
            background: #333; border-radius: 25px; padding: 4px 12px; align-items: center;
        }
        input { 
            flex: 1; background: transparent; border: none; 
            color: white; padding: 10px; outline: none; font-size: 16px; 
        }
        button { 
            background: var(--accent); border: none; color: white; 
            width: 34px; height: 34px; border-radius: 50%; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="loader">
        <div id="status">Iniciando Motor Lite...</div>
        <div class="progress-box"><div id="bar"></div></div>
        <p style="font-size: 10px; color: #666; margin-top: 8px;">Otimizado para 4GB RAM</p>
    </div>

    <header>ClassBot Lite</header>
    
    <div id="messages">
        <div class="msg ai">Oi! Estou pronto. Como rodo localmente, sou rápido e não gasto seus dados. O que quer saber?</div>
    </div>

    <div id="input-area">
        <div class="box">
            <input type="text" id="userInput" placeholder="Diga algo...">
            <button id="sendBtn">↑</button>
        </div>
    </div>

    <script type="module">
        // Usando a versão estável do Transformers.js
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1';

        // Configurações para economizar memória RAM
        env.allowLocalModels = false;
        env.useBrowserCache = true;

        let pipe;
        const bar = document.getElementById('bar');
        const status = document.getElementById('status');
        const loader = document.getElementById('loader');

        async function start() {
            try {
                // GPT-2 é o modelo mais seguro para 4GB de RAM
                pipe = await pipeline('text-generation', 'Xenova/gpt2', {
                    progress_callback: (p) => {
                        if (p.status === 'progress') {
                            bar.style.width = p.progress + '%';
                            status.innerText = `Baixando Inteligência: ${Math.round(p.progress)}%`;
                        }
                    }
                });
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 400);
            } catch (err) {
                status.innerText = "Erro: Sem memória suficiente ou bloqueio do navegador.";
                console.error(err);
            }
        }

        async function enviar() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text || !pipe) return;

            addMsg(text, 'user');
            input.value = '';
            const aiMsg = addMsg("...", 'ai');

            // Geração ultra-curta para não travar a RAM
            const output = await pipe(text, { 
                max_new_tokens: 30,
                temperature: 0.7,
                do_sample: true
            });

            let response = output[0].generated_text.replace(text, "").trim();
            aiMsg.innerText = response || "Entendi. Pode continuar?";
            scrollDown();
        }

        function addMsg(t, s) {
            const d = document.createElement("div");
            d.className = `msg ${s}`;
            d.innerText = t;
            document.getElementById("messages").appendChild(d);
            scrollDown();
            return d;
        }

        function scrollDown() {
            const m = document.getElementById("messages");
            m.scrollTop = m.scrollHeight;
        }

        document.getElementById('sendBtn').onclick = enviar;

        // Fix teclado mobile
        window.visualViewport?.addEventListener('resize', () => {
            document.body.style.height = window.visualViewport.height + 'px';
            scrollDown();
        });

        start();
    </script>
</body>
</html>
