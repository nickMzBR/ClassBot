<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ClassBot - Google Direto</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #222; color: #e3e3e3; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; }
        .header { padding: 15px; font-size: 1.4em; font-weight: bold; color: #4facfe; text-align: center; border-bottom: 1px solid #333; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 12px 16px; border-radius: 18px; max-width: 85%; line-height: 1.5; font-size: 15px; }
        .bot { background: #1a1a1a; align-self: flex-start; border: 1px solid #333; border-bottom-left-radius: 2px; }
        .user { background: #333; align-self: flex-end; border: 1px solid #444; border-bottom-right-radius: 2px; }
        .loader { font-size: 0.8em; color: #4facfe; text-align: center; display: none; padding: 10px; }
        .input-container { background: #1a1a1a; padding: 15px; border-top: 1px solid #333; }
        .input-area { background: #333; border-radius: 25px; display: flex; padding: 5px 15px; border: 1px solid #4facfe; align-items: center; max-width: 700px; margin: 0 auto; }
        textarea { flex: 1; background: transparent; border: none; color: white; padding: 10px 0; outline: none; font-size: 16px; resize: none; height: 45px; font-family: inherit; }
        button { background: #4facfe; border: none; color: white; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; margin-left: 10px; flex-shrink: 0; }
    </style>
</head>
<body>

    <div class="header">🤖 ClassBot Google</div>
    <div id="chat">
        <div class="msg bot">Mande sua pergunta de prova. Vou tentar extrair a resposta direta do Google para você!</div>
    </div>
    <div id="loading" class="loader">ClassBot extraindo resposta...</div>

    <div class="input-container">
        <div class="input-area">
            <textarea id="pergunta" placeholder="Cole sua questão..."></textarea>
            <button onclick="buscar()">➤</button>
        </div>
    </div>

<script>
    async function buscar() {
        const input = document.getElementById('pergunta');
        const chat = document.getElementById('chat');
        const loader = document.getElementById('loading');
        const query = input.value.trim();

        if (!query) return;

        chat.innerHTML += `<div class="msg user">${query}</div>`;
        input.value = "";
        loader.style.display = "block";
        chat.scrollTop = chat.scrollHeight;

        try {
            // Usando o buscador DuckDuckGo que fornece o "Snippet" (Resumo do Google) sem bloquear o celular
            const url = `https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_html=1`;
            
            const response = await fetch(url);
            const data = await response.json();
            
            loader.style.display = "none";
            
            let resposta = "";
            if (data.AbstractText) {
                // Aqui ele pega o "quadro de resposta" principal
                resposta = `<b>Resposta Direta:</b><br>${data.AbstractText}`;
            } else if (data.RelatedTopics && data.RelatedTopics.length > 0) {
                resposta = `<b>O que encontrei:</b><br>${data.RelatedTopics[0].Text}`;
            } else {
                // Se ele não achar o quadro, ele gera o link de gabarito como plano B
                const linkBusca = "https://www.google.com/search?q=" + encodeURIComponent(query);
                resposta = `Não consegui resumir agora, mas a resposta está no topo deste link: <br><a href="${linkBusca}" target="_blank" style="color:#4facfe">Ver Gabarito no Google</a>`;
            }

            chat.innerHTML += `<div class="msg bot">${resposta}</div>`;

        } catch (e) {
            loader.style.display = "none";
            chat.innerHTML += `<div class="msg bot">Erro ao conectar. Tente encurtar um pouco a pergunta.</div>`;
        }
        chat.scrollTop = chat.scrollHeight;
    }

    document.getElementById('pergunta').addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = (this.scrollHeight > 150 ? 150 : this.scrollHeight) + 'px';
    });
</script>

</body>
</html>
