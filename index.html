<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ClassBot - Gabarito</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #222; color: #e3e3e3; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; }
        .header { padding: 15px; font-size: 1.4em; font-weight: bold; color: #4facfe; text-align: center; border-bottom: 1px solid #333; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 12px 16px; border-radius: 18px; max-width: 85%; line-height: 1.5; font-size: 15px; }
        .bot { background: #1a1a1a; align-self: flex-start; border: 1px solid #333; }
        .user { background: #333; align-self: flex-end; border: 1px solid #444; }
        .btn-link { display: inline-block; margin-top: 10px; padding: 10px; background: #4facfe; color: white; text-decoration: none; border-radius: 10px; font-weight: bold; text-align: center; }
        .input-container { background: #1a1a1a; padding: 15px; border-top: 1px solid #333; }
        .input-area { background: #333; border-radius: 25px; display: flex; padding: 5px 15px; border: 1px solid #4facfe; align-items: center; max-width: 700px; margin: 0 auto; }
        textarea { flex: 1; background: transparent; border: none; color: white; padding: 10px 0; outline: none; font-size: 16px; resize: none; height: 45px; }
        button { background: #4facfe; border: none; color: white; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; margin-left: 10px; }
    </style>
</head>
<body>

    <div class="header">🤖 ClassBot Gabarito</div>
    <div id="chat">
        <div class="msg bot">Cole a sua questão de prova. Eu vou encontrar o gabarito para você!</div>
    </div>

    <div class="input-container">
        <div class="input-area">
            <textarea id="pergunta" placeholder="Cole a questão aqui..."></textarea>
            <button onclick="buscar()">➤</button>
        </div>
    </div>

<script>
    function buscar() {
        const input = document.getElementById('pergunta');
        const chat = document.getElementById('chat');
        const query = input.value.trim();

        if (!query) return;

        // Mostra a pergunta no chat
        chat.innerHTML += `<div class="msg user">Questão enviada...</div>`;
        
        // Limpa o texto para a busca
        let buscaLimpa = query.split('A)')[0]; // Pega só o enunciado se tiver alternativas
        if(buscaLimpa.length > 100) buscaLimpa = buscaLimpa.substring(0, 100);

        const googleUrl = "https://www.google.com/search?q=" + encodeURIComponent(buscaLimpa + " alternativa correta gabarito");

        setTimeout(() => {
            chat.innerHTML += `
                <div class="msg bot">
                    <b>ClassBot encontrou a questão!</b><br>
                    Para ver a alternativa correta e a explicação, clique no botão abaixo:
                    <a href="${googleUrl}" class="btn-link" target="_blank">VER ALTERNATIVA CORRETA</a>
                </div>`;
            chat.scrollTop = chat.scrollHeight;
        }, 800);

        input.value = "";
        input.style.height = "45px";
    }
</script>

</body>
</html>
