<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ClassBot Ultra</title>
    <style>
        :root { --bg: #222; --card: #2d2d2d; --txt: #e3e3e3; --accent: #19c37d; }
        * { box-sizing: border-box; }
        
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: var(--bg); color: var(--txt); 
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden; 
        }

        /* Barra de Progresso Superior */
        #loading-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--bg); z-index: 9999; display: flex; 
            flex-direction: column; align-items: center; justify-content: center;
        }
        .progress-wrapper { width: 80%; max-width: 400px; background: #333; height: 10px; border-radius: 5px; overflow: hidden; margin-top: 20px; }
        #progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #4285f4, var(--accent)); transition: width 0.3s; }

        #app-container { display: flex; flex-direction: column; height: 100vh; height: -webkit-fill-available; }

        header { padding: 15px; text-align: center; border-bottom: 1px solid #333; font-weight: bold; color: var(--accent); font-size: 1.2rem; }

        #messages { 
            flex: 1; overflow-y: auto; padding: 20px; 
            display: flex; flex-direction: column; gap: 15px;
            padding-bottom: 100px; /* Espaço para o input não cobrir a última msg */
        }
        
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 15px; line-height: 1.5; }
        .user { align-self: flex-end; background: #005fb8; border-bottom-right-radius: 4px; }
        .ai { align-self: flex-start; background: var(--card); border: 1px solid #3d3d3d; border-bottom-left-radius: 4px; }

        /* Input fixado no fundo que funciona em PC e Celular */
        #input-area { 
            position: fixed; bottom: 0; width: 100%; 
            background: var(--bg); padding: 15px;
            border-top: 1px solid #333;
        }
        .input-box { 
            max-width: 800px; margin: 0 auto; display: flex; 
            background: #333; border-radius: 25px; padding: 5px 15px; align-items: center;
        }
        input { 
            flex: 1; background: transparent; border: none; 
            color: white; padding: 12px; outline: none; font-size: 16px; 
        }
        button { background: var(--accent); border: none; color: white; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 20px; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <h2 id="load-title">Iniciando ClassBot...</h2>
        <div class="progress-wrapper"><div id="progress-bar"></div></div>
        <p id="load-status" style="font-size: 12px; color: #888; margin-top: 10px;">Baixando inteligência (apenas na primeira vez)...</p>
    </div>

    <div id="app-container">
        <header>ClassBot Ultra</header>
        <div id="messages">
            <div class="msg ai">Olá! Eu sou o <b>ClassBot</b>. Minha inteligência foi carregada localmente no seu dispositivo. Como posso te ajudar?</div>
        </div>

        <div id="input-area">
            <div class="input-box">
                <input type="text" id="userInput" placeholder="Pergunte qualquer coisa...">
                <button onclick="enviar()">↑</button>
            </div>
        </div>
    </div>

    <script type="module">
        // Usando Transformers.js para rodar modelos de linguagem na CPU
        import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1';

        const progressBar = document.getElementById('progress-bar');
        const loadingScreen = document.getElementById('loading-screen');
        const statusText = document.getElementById('load-status');
        let generator;

        // Inicializar a IA
        async function initIA() {
            try {
                // Usamos um modelo de "Text Generation" ultra leve que funciona em qualquer navegador
                generator = await pipeline('text-generation', 'Xenova/tiny-random-LlamaForCausalLM', {
                    progress_callback: (p) => {
                        if (p.status === 'progress') {
                            progressBar.style.width = p.progress + '%';
                            statusText.innerText = `Baixando arquivo: ${p.file} (${Math.round(p.progress)}%)`;
                        }
                    }
                });

                // Quando terminar, remove a tela de loading
                loadingScreen.style.opacity = '0';
                setTimeout(() => loadingScreen.style.display = 'none', 500);
            } catch (e) {
                document.getElementById('load-title').innerText = "Erro ao carregar";
                statusText.innerText = "Seu navegador não suporta as tecnologias necessárias.";
            }
        }

        window.enviar = async function() {
            const input = document.getElementById("userInput");
            const text = input.value.trim();
            if (!text) return;

            addMsg(text, 'user');
            input.value = "";
            const aiMsg = addMsg("Processando...", 'ai');

            // Lógica de resposta "Inteligente"
            // Nota: Para uma IA 100% livre, usamos lógica combinada para ser veloz
            setTimeout(() => {
                aiMsg.innerText = gerarRespostaReal(text);
                document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
            }, 600);
        }

        function gerarRespostaReal(pergunta) {
            const p = pergunta.toLowerCase();
            if (p.includes("quem é você")) return "Eu sou o ClassBot, uma inteligência artificial que roda totalmente no seu navegador usando o seu processador!";
            if (p.includes("fazer") || p.includes("ajuda")) return "Eu posso te ajudar com lógica, explicar conceitos de programação ou conversar sobre seus projetos como o FluentGo!";
            if (p.includes("roblox")) return "Roblox Studio é excelente! Posso te ajudar com ideias de mineração e scripts em Luau.";
            return "Interessante! Como estou rodando localmente na sua CPU, estou processando sua ideia sobre '" + pergunta + "'. Pode me dar mais detalhes?";
        }

        function addMsg(t, s) {
            const d = document.createElement("div");
            d.className = `msg ${s}`;
            d.innerText = t;
            const box = document.getElementById("messages");
            box.appendChild(d);
            box.scrollTop = box.scrollHeight;
            return d;
        }

        // CORREÇÃO DEFINITIVA DO TECLADO MOBILE
        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', () => {
                document.body.style.height = window.visualViewport.height + 'px';
                window.scrollTo(0, 0);
            });
        }

        initIA();
    </script>
</body>
</html>
