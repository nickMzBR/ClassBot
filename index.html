<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ClassBot v3</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #222; color: #e3e3e3; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; }
        .header { padding: 15px; font-size: 1.5em; font-weight: bold; color: #4facfe; text-align: center; border-bottom: 1px solid #333; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 12px 16px; border-radius: 18px; max-width: 85%; line-height: 1.5; font-size: 16px; }
        .bot { background: #1a1a1a; align-self: flex-start; border: 1px solid #333; border-bottom-left-radius: 2px; }
        .user { background: #333; align-self: flex-end; border: 1px solid #444; border-bottom-right-radius: 2px; }
        .loading { font-size: 0.85em; color: #4facfe; text-align: center; padding: 10px; display: none; }
        .input-container { background: #1a1a1a; padding: 15px; border-top: 1px solid #333; }
        .input-area { background: #333; border-radius: 25px; display: flex; padding: 5px 5px 5px 15px; border: 1px solid #444; align-items: center; max-width: 600px; margin: 0 auto; }
        input { flex: 1; background: transparent; border: none; color: white; padding: 12px 0; outline: none; font-size: 16px; }
        button { background: #4facfe; border: none; color: white; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 1.2em; display: flex; align-items: center; justify-content: center; margin-left: 10px; }
    </style>
</head>
<body>
    <div class="header">🤖 ClassBot</div>
    <div id="chat">
        <div class="msg bot">Olá! Sou o <b>ClassBot</b>. O que vamos pesquisar hoje?</div>
    </div>
    <div id="loader" class="loading">ClassBot está processando...</div>
    <div class="input-container">
        <div class="input-area">
            <input type="text" id="pergunta" placeholder="Ex: Alan Turing" autocomplete="off">
            <button onclick="buscar()">➤</button>
        </div>
    </div>

<script>
    async function buscar() {
        const input = document.getElementById('pergunta');
        const chat = document.getElementById('chat');
        const loader = document.getElementById('loader');
        let texto = input.value.trim();

        if (!texto) return;

        chat.innerHTML += `<div class="msg user">${texto}</div>`;
        input.value = "";
        loader.style.display = "block";
        chat.scrollTop = chat.scrollHeight;

        try {
            // 1ª Tentativa: Busca direta
            let response = await fetch(`https://pt.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(texto)}`);
            let data = await response.json();

            // 2ª Tentativa: Se não achar, busca o termo correto primeiro
            if (data.type === "disambiguation" || data.title === "Not found.") {
                const searchRes = await fetch(`https://pt.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(texto)}&format=json&origin=*`);
                const searchData = await searchRes.json();
                
                if (searchData.query.search.length > 0) {
                    const novoTermo = searchData.query.search[0].title;
                    response = await fetch(`https://pt.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(novoTermo)}`);
                    data = await response.json();
                }
            }

            loader.style.display = "none";
            let resposta = data.extract ? `<b>${data.title}</b>: ${data.extract}` : "Não encontrei nada sobre isso. Tente ser mais simples.";
            chat.innerHTML += `<div class="msg bot">${resposta}</div>`;
            
        } catch (e) {
            loader.style.display = "none";
            chat.innerHTML += `<div class="msg bot">Erro na rede. Tente de novo!</div>`;
        }
        chat.scrollTop = chat.scrollHeight;
    }

    document.getElementById('pergunta').addEventListener('keypress', (e) => { if(e.key === 'Enter') buscar(); });
</script>
</body>
</html>
