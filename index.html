<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ClassBot AI | Realtime</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #007bff; --bg: #222; --card: #2d2d2d; --white: #ffffff; }
        * { box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body, html { margin: 0; padding: 0; height: 100vh; background: var(--bg); color: var(--white); display: flex; flex-direction: column; overflow: hidden; }

        /* Login */
        #login-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .auth-box { width: 85%; max-width: 300px; text-align: center; }
        .auth-input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #444; background: #1a1a1a; color: white; outline: none; }
        .btn-p { width: 100%; background: var(--primary); color: white; padding: 12px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; }
        .btn-s { background: none; border: none; color: #888; margin-top: 15px; cursor: pointer; font-size: 0.8rem; }

        /* App */
        header { padding: 15px 20px; background: #1a1a1a; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.4; }
        .user { align-self: flex-end; background: var(--primary); border-bottom-right-radius: 4px; }
        .ai { align-self: flex-start; background: var(--card); border: 1px solid #3d3d3d; border-bottom-left-radius: 4px; }

        #input-area { padding: 15px; background: var(--bg); }
        .box { max-width: 600px; margin: 0 auto; display: flex; background: var(--card); border-radius: 50px; padding: 5px 5px 5px 20px; border: 1px solid #444; }
        input[type="text"] { flex: 1; background: transparent; border: none; color: var(--white); outline: none; }
        #sendBtn { background: var(--primary); border: none; color: white; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="auth-box">
            <h2 style="color: var(--primary)">ClassBot</h2>
            <input type="text" id="userLogin" class="auth-input" placeholder="Usuário">
            <input type="password" id="passLogin" class="auth-input" placeholder="Senha">
            <button class="btn-p" onclick="entrar()">Entrar</button>
            <button class="btn-s" onclick="cadastrar()">Criar Conta</button>
        </div>
    </div>

    <header>
        <div style="font-weight: 700; color: var(--primary)">ClassBot</div>
        <button onclick="sair()" style="background:none; border:none; color:#ff4444; cursor:pointer; font-size: 0.7rem;">SAIR</button>
    </header>

    <div id="messages"></div>

    <div id="input-area">
        <div class="box">
            <input type="text" id="userInput" placeholder="Manda a real..." autocomplete="off">
            <button id="sendBtn">↑</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, get, child, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB0vSCE32XEg0IL6LaRzmlvfa3qj1priPg",
            authDomain: "classbot-807d8.firebaseapp.com",
            databaseURL: "https://classbot-807d8-default-rtdb.firebaseio.com/",
            projectId: "classbot-807d8",
            storageBucket: "classbot-807d8.firebasestorage.app",
            messagingSenderId: "117494419469",
            appId: "1:117494419469:web:ca12637334e9a7d8090544"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let usuarioLogado = localStorage.getItem("cb_user") || null;
        let historico = [];

        if (usuarioLogado) {
            document.getElementById('login-overlay').style.display = 'none';
            carregarChat();
        }

        window.cadastrar = async () => {
            const u = document.getElementById('userLogin').value.trim().toLowerCase();
            const p = document.getElementById('passLogin').value;
            if(!u || !p) return alert("Preencha tudo!");

            const dbRef = ref(db);
            const snapshot = await get(child(dbRef, `usuarios/${u}`));
            
            if (snapshot.exists()) {
                alert("Usuário já existe!");
            } else {
                await set(ref(db, 'usuarios/' + u), { senha: p });
                alert("Criado! Agora entre.");
            }
        };

        window.entrar = async () => {
            const u = document.getElementById('userLogin').value.trim().toLowerCase();
            const p = document.getElementById('passLogin').value;

            const dbRef = ref(db);
            const snapshot = await get(child(dbRef, `usuarios/${u}`));

            if (snapshot.exists() && snapshot.val().senha === p) {
                usuarioLogado = u;
                localStorage.setItem("cb_user", u);
                document.getElementById('login-overlay').style.display = 'none';
                carregarChat();
            } else {
                alert("Erro no login!");
            }
        };

        window.sair = () => {
            localStorage.clear();
            location.reload();
        };

        async function carregarChat() {
            const snapshot = await get(ref(db, 'chats/' + usuarioLogado));
            if (snapshot.exists()) {
                historico = snapshot.val() || [];
                document.getElementById('messages').innerHTML = "";
                historico.forEach(m => addMsg(m.content, m.role === 'user' ? 'user' : 'ai'));
            }
        }

        async function enviar() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text || !usuarioLogado) return;

            addMsg(text, 'user');
            input.value = '';
            
            historico.push({ role: "user", content: text });
            await set(ref(db, 'chats/' + usuarioLogado), historico);

            const aiMsg = addMsg("...", 'ai');

            try {
                const response = await fetch("/api/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ mensagens: historico.slice(-6) })
                });
                const data = await response.json();
                
                if (data.answer) {
                    aiMsg.textContent = data.answer;
                    historico.push({ role: "assistant", content: data.answer });
                    await set(ref(db, 'chats/' + usuarioLogado), historico);
                }
            } catch (e) { aiMsg.textContent = "Erro na conexão."; }
        }

        function addMsg(t, s) {
            const d = document.createElement("div");
            d.className = `msg ${s}`;
            d.textContent = t;
            const container = document.getElementById("messages");
            container.appendChild(d);
            container.scrollTop = container.scrollHeight;
            return d;
        }

        document.getElementById('sendBtn').onclick = enviar;
        document.getElementById('userInput').onkeypress = (e) => { if(e.key === 'Enter') enviar(); };
    </script>
</body>
</html>
