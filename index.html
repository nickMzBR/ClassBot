<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ClassBot AI</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <style>
        :root { --bg: #222; --card: #2d2d2d; --txt: #e3e3e3; --accent: #19c37d; }
        
        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: var(--bg); color: var(--txt); 
            font-family: -apple-system, sans-serif;
            overflow: hidden; 
        }

        /* Barra de Progresso Superior */
        #progress-container { position: fixed; top: 0; width: 100%; height: 4px; background: #333; z-index: 1000; display: none; }
        #progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #4285f4, #19c37d); transition: width 0.3s; }

        /* Estrutura Principal para evitar bug de teclado */
        #app-container {
            display: flex; flex-direction: column;
            height: 100vh; height: -webkit-fill-available;
        }

        header { padding: 15px; text-align: center; border-bottom: 1px solid #333; font-weight: bold; font-size: 1.2rem; color: var(--accent); }

        #messages { 
            flex: 1; overflow-y: auto; padding: 20px; 
            display: flex; flex-direction: column; gap: 15px;
        }
        
        .msg { max-width: 85%; padding: 12px; border-radius: 15px; font-size: 15px; line-height: 1.5; }
        .user { align-self: flex-end; background: #444; color: white; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: var(--card); border: 1px solid #3d3d3d; border-bottom-left-radius: 2px; }

        /* Área de Input no Rodapé */
        #input-area { padding: 15px; background: var(--bg); border-top: 1px solid #333; }
        .input-box { 
            max-width: 600px; margin: 0 auto; display: flex; 
            background: #333; border-radius: 25px; padding: 5px 15px; align-items: center; 
        }
        input { 
            flex: 1; background: transparent; border: none; 
            color: white; padding: 12px; outline: none; font-size: 16px; 
        }
        button { background: var(--accent); border: none; color: white; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; font-size: 18px; }
        
        #status-info { font-size: 10px; text-align: center; color: #777; margin-bottom: 5px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="progress-container"><div id="progress-bar"></div></div>

    <div id="app-container">
        <header>ClassBot</header>

        <div id="messages">
            <div class="msg ai">Olá! Eu sou o <b>ClassBot</b>. Como posso ajudar-te hoje?</div>
        </div>

        <div id="input-area">
            <div id="status-info">Motor Local: Pronto</div>
            <div class="input-box">
                <input type="text" id="userInput" placeholder="Pergunta ao ClassBot...">
                <button onclick="handleAction()">↑</button>
            </div>
        </div>
    </div>

    <script type="module">
        import * as webllm from "https://esm.run/@mlc-ai/web-llm";

        const messagesDiv = document.getElementById("messages");
        const statusText = document.getElementById("status-info");
        const bar = document.getElementById("progress-bar");
        const pContainer = document.getElementById("progress-container");

        let engine;
        const modelName = "Gemma-2b-it-q4f32_1-MLC";

        window.handleAction = async function() {
            const input = document.getElementById("userInput");
            const text = input.value.trim();
            if(!text) return;

            addMsg(text, 'user');
            input.value = "";
            const aiMsg = addMsg("O ClassBot está a processar...", 'ai');

            try {
                if (!engine) {
                    pContainer.style.display = "block";
                    engine = await webllm.CreateMLCEngine(modelName, {
                        initProgressCallback: (report) => {
                            bar.style.width = (report.progress * 100) + "%";
                            statusText.innerText = `A carregar ClassBot: ${Math.round(report.progress * 100)}%`;
                        }
                    });
                    pContainer.style.display = "none";
                    statusText.innerText = "ClassBot Online";
                }

                const chunks = await engine.chat.completions.create({
                    messages: [{ role: "user", content: text }],
                    stream: true
                });

                let response = "";
                for await (const chunk of chunks) {
                    response += chunk.choices[0]?.delta?.content || "";
                    aiMsg.innerText = response;
                    messagesDiv.scrollTop = messagesDiv.scrollHeight;
                }
            } catch (e) {
                aiMsg.innerHTML = "<b>Erro de WebGPU:</b> O teu navegador ou telemóvel não suporta esta tecnologia. <br><br>Ativa 'WebGPU' em <i>chrome://flags</i> ou usa um dispositivo mais recente.";
                console.error(e);
            }
        }

        function addMsg(t, s) {
            const d = document.createElement("div");
            d.className = `msg ${s}`;
            d.innerText = t;
            messagesDiv.appendChild(d);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            return d;
        }

        // Corrigir altura no mobile quando o teclado abre
        window.visualViewport.addEventListener('resize', () => {
            document.getElementById('app-container').style.height = window.visualViewport.height + 'px';
        });
    </script>
</body>
</html>
