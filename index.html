<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ClassBot AI</title>
    <style>
        :root { --bg: #222; --card: #2d2d2d; --txt: #e3e3e3; --accent: #19c37d; }
        * { box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            margin: 0; padding: 0; height: 100vh; 
            background: var(--bg); color: var(--txt); 
            overflow: hidden; display: flex; flex-direction: column;
        }

        /* Tela de Entrada */
        #loader { 
            position: fixed; inset: 0; background: var(--bg); z-index: 2000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            transition: opacity 0.5s;
        }
        .progress-box { width: 70%; max-width: 250px; background: #333; height: 6px; border-radius: 10px; margin-top: 15px; overflow: hidden; }
        #bar { width: 0%; height: 100%; background: var(--accent); transition: width 0.4s; }

        header { padding: 15px; text-align: center; border-bottom: 1px solid #333; font-weight: bold; background: #252525; color: var(--accent); }

        #messages { 
            flex: 1; overflow-y: auto; padding: 20px; 
            display: flex; flex-direction: column; gap: 15px;
            padding-bottom: 100px; 
        }
        
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 15px; line-height: 1.5; white-space: pre-wrap; }
        .user { align-self: flex-end; background: #005fb8; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: var(--card); border: 1px solid #3d3d3d; border-bottom-left-radius: 2px; }

        /* Barra de Input */
        #input-area { 
            position: fixed; bottom: 0; width: 100%; 
            background: var(--bg); padding: 15px;
            border-top: 1px solid #333;
        }
        .box { 
            max-width: 800px; margin: 0 auto; display: flex; 
            background: #333; border-radius: 30px; padding: 5px 15px; align-items: center;
        }
        input { 
            flex: 1; background: transparent; border: none; 
            color: white; padding: 12px; outline: none; font-size: 16px; 
        }
        button { 
            background: var(--accent); border: none; color: white; 
            width: 40px; height: 40px; border-radius: 50%; cursor: pointer;
            font-size: 20px; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="loader">
        <h3 id="status">Iniciando ClassBot...</h3>
        <div class="progress-box"><div id="bar"></div></div>
    </div>

    <header>ClassBot Pro</header>
    
    <div id="messages">
        <div class="msg ai">Olá! Agora sou uma <b>IA Generativa de Elite</b>. Posso conversar sobre qualquer assunto, resolver códigos e ajudar com seus projetos. Como posso ajudar?</div>
    </div>

    <div id="input-area">
        <div class="box">
            <input type="text" id="userInput" placeholder="Digite sua mensagem..." autocomplete="off">
            <button id="sendBtn">↑</button>
        </div>
    </div>

    <script>
        // Animação de entrada
        window.onload = () => {
            const bar = document.getElementById('bar');
            setTimeout(() => { bar.style.width = '100%'; }, 100);
            setTimeout(() => { 
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => { document.getElementById('loader').style.display = 'none'; }, 500);
            }, 800);
        };

        async function enviar() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;

            addMsg(text, 'user');
            input.value = '';
            
            // Criar balão de "pensando"
            const aiMsg = addMsg("...", 'ai');
            scrollDown();

            try {
                // Chamada para a sua API na Vercel
                const response = await fetch("/api/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ prompt: text })
                });
                
                const data = await response.json();
                
                if (data.answer) {
                    aiMsg.innerText = data.answer;
                } else {
                    aiMsg.innerText = "Erro ao receber resposta da IA.";
                }
            } catch (e) {
                aiMsg.innerText = "Erro de conexão com o servidor.";
                console.error(e);
            }
            scrollDown();
        }

        function addMsg(t, s) {
            const d = document.createElement("div");
            d.className = `msg ${s}`;
            d.innerText = t;
            document.getElementById("messages").appendChild(d);
            scrollDown();
            return d;
        }

        function scrollDown() {
            const m = document.getElementById("messages");
            m.scrollTop = m.scrollHeight;
        }

        document.getElementById('sendBtn').onclick = enviar;
        document.getElementById('userInput').onkeypress = (e) => { if(e.key === 'Enter') enviar(); };

        // Ajuste teclado mobile
        window.visualViewport?.addEventListener('resize', () => {
            document.body.style.height = window.visualViewport.height + 'px';
            scrollDown();
        });
    </script>
</body>
</html>
