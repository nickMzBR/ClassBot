<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ClassBot Ultra</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/qna"></script>
    <style>
        :root { --bg: #222; --card: #2d2d2d; --txt: #e3e3e3; --accent: #19c37d; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--txt); font-family: sans-serif; overflow: hidden; }
        #app-container { display: flex; flex-direction: column; height: 100vh; }
        header { padding: 15px; text-align: center; border-bottom: 1px solid #333; font-weight: bold; color: var(--accent); }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 85%; padding: 12px; border-radius: 15px; font-size: 15px; line-height: 1.5; }
        .user { align-self: flex-end; background: #444; }
        .ai { align-self: flex-start; background: var(--card); border: 1px solid #3d3d3d; }
        #input-area { padding: 15px; background: var(--bg); border-top: 1px solid #333; }
        .input-box { max-width: 600px; margin: 0 auto; display: flex; background: #333; border-radius: 25px; padding: 5px 15px; }
        input { flex: 1; background: transparent; border: none; color: white; padding: 12px; outline: none; font-size: 16px; }
        button { background: var(--accent); border: none; color: white; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; }
        #loader { font-size: 10px; text-align: center; color: #777; margin-bottom: 5px; }
    </style>
</head>
<body>

<div id="app-container">
    <header>ClassBot Gênio</header>
    <div id="messages">
        <div class="msg ai">Olá! Sou o <b>ClassBot Ultra</b>. Diferente de IAs simples, eu uso o motor <b>MobileBERT</b> para processar suas perguntas localmente.</div>
    </div>
    <div id="input-area">
        <div id="loader">Aguardando...</div>
        <div class="input-box">
            <input type="text" id="userInput" placeholder="Faça uma pergunta difícil...">
            <button onclick="enviar()">↑</button>
        </div>
    </div>
</div>

<script>
    let model = null;

    // Carrega o "Cérebro" MobileBERT do Google
    async function carregarModelo() {
        document.getElementById('loader').innerText = "Carregando Cérebro da IA (isso ocorre apenas 1x)...";
        model = await qna.load();
        document.getElementById('loader').innerText = "ClassBot Inteligente Pronto!";
    }

    async function enviar() {
        const input = document.getElementById("userInput");
        const texto = input.value.trim();
        if (!texto) return;

        addMsg(texto, 'user');
        input.value = "";
        
        const aiMsg = addMsg("Pensando com meu modelo neural...", 'ai');

        if (!model) await carregarModelo();

        // Para modelos de Question Answering, ele precisa de um contexto.
        // Vamos dar um contexto gigante de conhecimentos gerais para ele.
        const contexto = "O ClassBot é uma inteligência artificial avançada. HTML é uma linguagem de marcação. Roblox é uma plataforma de jogos onde se pode minerar e construir bases. FluentGo é um aplicativo de idiomas moderno em azul e branco. Inteligência artificial permite que computadores aprendam. O Brasil fica na América do Sul.";

        try {
            const respostas = await model.findAnswers(texto, contexto);
            
            if (respostas.length > 0) {
                aiMsg.innerText = respostas[0].text;
            } else {
                aiMsg.innerText = "Eu entendi a pergunta, mas preciso de mais contexto no meu banco de dados para responder com precisão.";
            }
        } catch (e) {
            aiMsg.innerText = "Houve um erro no processamento neural.";
        }
    }

    function addMsg(t, s) {
        const d = document.createElement("div");
        d.className = `msg ${s}`;
        d.innerText = t;
        const box = document.getElementById("messages");
        box.appendChild(d);
        box.scrollTop = box.scrollHeight;
        return d;
    }
</script>
</body>
</html>
