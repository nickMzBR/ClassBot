<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ClassBot | Classtech</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #007bff; --bg: #1e1e1e; --sidebar: #121212; --card: #2d2d2d; --white: #ffffff; --hover: #353535; }
        
        * { box-sizing: border-box; font-family: 'Montserrat', sans-serif; margin: 0; padding: 0; }
        
        body, html { height: 100vh; background: var(--bg); color: var(--white); overflow: hidden; display: flex; }

        /* Login Overlay */
        #login-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .auth-box { width: 90%; max-width: 320px; text-align: center; background: var(--card); padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .auth-input { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 8px; border: 1px solid #444; background: #121212; color: white; outline: none; }

        /* Sidebar Responsiva */
        #sidebar { 
            width: 280px; background: var(--sidebar); display: flex; flex-direction: column; 
            border-right: 1px solid #333; transition: transform 0.3s ease; z-index: 1000;
        }

        .new-chat { margin: 15px; padding: 12px; border: 1px solid #444; border-radius: 8px; cursor: pointer; text-align: center; font-weight: 600; background: transparent; color: white; transition: 0.2s; }
        .new-chat:hover { background: var(--hover); }
        
        #chat-list { flex: 1; overflow-y: auto; padding: 0 10px; }
        .chat-item { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px; margin-bottom: 8px; border-radius: 8px; cursor: pointer; 
            font-size: 0.9rem; color: #ccc; transition: 0.2s;
        }
        .chat-item:hover, .chat-item.active { background: var(--card); color: white; }
        .chat-item span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
        .btn-delete { color: #555; padding: 5px; margin-left: 10px; transition: 0.2s; }
        .btn-delete:hover { color: #ff4444; }

        .user-footer { padding: 15px; border-top: 1px solid #333; display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; }

        /* Área Principal */
        #main { flex: 1; display: flex; flex-direction: column; height: 100vh; position: relative; }
        
        header { 
            padding: 15px 20px; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 15px; 
            background: rgba(30,30,30,0.8); backdrop-filter: blur(10px); z-index: 500;
        }
        .menu-toggle { display: none; cursor: pointer; font-size: 1.5rem; }

        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; width: 100%; max-width: 800px; margin: 0 auto; }
        .msg-row { display: flex; flex-direction: column; margin-bottom: 25px; width: 100%; }
        .msg-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; margin-bottom: 5px; color: var(--primary); }
        .ai .msg-label { color: #888; }
        .msg-content { font-size: 1rem; line-height: 1.6; white-space: pre-wrap; }

        /* Input responsivo */
        #input-area { padding: 20px; width: 100%; max-width: 800px; margin: 0 auto; }
        .input-box { display: flex; background: var(--card); border-radius: 12px; padding: 10px 15px; border: 1px solid #444; align-items: center; }
        #userInput { flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 16px; padding: 5px; }
        #sendBtn { background: var(--primary); border: none; color: white; width: 40px; height: 40px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* Estilos para Mobile */
        @media (max-width: 768px) {
            .menu-toggle { display: block; }
            #sidebar { position: fixed; height: 100vh; left: 0; transform: translateX(-100%); width: 260px; }
            #sidebar.open { transform: translateX(0); box-shadow: 10px 0 30px rgba(0,0,0,0.8); }
            #messages { padding: 15px; }
            .overlay-active { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 900; display: none; }
            .overlay-active.show { display: block; }
        }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="auth-box">
            <h1 style="color: var(--primary); margin-bottom: 10px;">ClassBot</h1>
            <input type="text" id="userLogin" class="auth-input" placeholder="Usuário">
            <input type="password" id="passLogin" class="auth-input" placeholder="Senha">
            <button onclick="entrar()" style="width:100%; padding:12px; background:var(--primary); border:none; border-radius:8px; color:white; font-weight:bold; cursor:pointer;">ACESSAR</button>
            <button onclick="cadastrar()" style="background:none; border:none; color:#666; margin-top:15px; cursor:pointer; font-size:0.8rem;">Criar conta</button>
        </div>
    </div>

    <div id="mobile-overlay" class="overlay-active" onclick="toggleMenu()"></div>

    <aside id="sidebar">
        <button class="new-chat" onclick="novaConversa()">+ Nova conversa</button>
        <div id="chat-list"></div>
        <div class="user-footer">
            <strong id="user-name">Usuário</strong>
            <span onclick="sair()" style="color:#ff4444; cursor:pointer; font-weight:bold;">Sair</span>
        </div>
    </aside>

    <main id="main">
        <header>
            <div class="menu-toggle" onclick="toggleMenu()">☰</div>
            <div style="font-weight: 700;">ClassBot <span style="font-weight: 400; font-size: 0.8rem; color: #666;">v2.0</span></div>
        </header>

        <div id="messages"></div>

        <div id="input-area">
            <div class="input-box">
                <input type="text" id="userInput" placeholder="Digite sua mensagem..." autocomplete="off">
                <button id="sendBtn">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
                </button>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, get, child, push, remove, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB0vSCE32XEg0IL6LaRzmlvfa3qj1priPg",
            authDomain: "classbot-807d8.firebaseapp.com",
            databaseURL: "https://classbot-807d8-default-rtdb.firebaseio.com/",
            projectId: "classbot-807d8",
            storageBucket: "classbot-807d8.firebasestorage.app",
            messagingSenderId: "117494419469",
            appId: "1:117494419469:web:ca12637334e9a7d8090544"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let usuario = localStorage.getItem("cb_user") || null;
        let conversaAtivaId = null;
        let historico = [];

        // --- INICIALIZAÇÃO ---
        if (usuario) {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('user-name').textContent = usuario;
            escutarConversas();
        }

        // --- INTERFACE ---
        window.toggleMenu = () => {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('mobile-overlay').classList.toggle('show');
        };

        // --- AUTH ---
        window.entrar = async () => {
            const u = document.getElementById('userLogin').value.trim().toLowerCase();
            const p = document.getElementById('passLogin').value;
            if(!u || !p) return;
            const snap = await get(ref(db, `usuarios/${u}`));
            if (snap.exists() && snap.val().senha === p) {
                localStorage.setItem("cb_user", u);
                location.reload();
            } else alert("Usuário ou senha inválidos!");
        };

        window.cadastrar = async () => {
            const u = document.getElementById('userLogin').value.trim().toLowerCase();
            const p = document.getElementById('passLogin').value;
            if(!u || p.length < 4) return alert("Dados inválidos!");
            await set(ref(db, `usuarios/${u}`), { senha: p });
            alert("Conta criada! Pode logar.");
        };

        window.sair = () => { localStorage.clear(); location.reload(); };

        // --- LOGICA DE CONVERSAS ---
        function escutarConversas() {
            const conversasRef = ref(db, `conversas/${usuario}`);
            onValue(conversasRef, (snapshot) => {
                const list = document.getElementById('chat-list');
                list.innerHTML = "";
                const data = snapshot.val();
                if (data) {
                    Object.keys(data).reverse().forEach(id => {
                        const primMsg = data[id][0]?.content || "Conversa vazia";
                        const item = document.createElement('div');
                        item.className = `chat-item ${id === conversaAtivaId ? 'active' : ''}`;
                        item.innerHTML = `
                            <span onclick="abrirConversa('${id}')">${primMsg}</span>
                            <div class="btn-delete" onclick="excluirConversa('${id}')">🗑</div>
                        `;
                        list.appendChild(item);
                    });
                }
            });
        }

        window.novaConversa = () => {
            conversaAtivaId = null;
            historico = [];
            document.getElementById('messages').innerHTML = "";
            if(window.innerWidth <= 768) toggleMenu();
        };

        window.abrirConversa = async (id) => {
            conversaAtivaId = id;
            const snap = await get(ref(db, `conversas/${usuario}/${id}`));
            if (snap.exists()) {
                historico = snap.val();
                renderizarMensagens();
            }
            if(window.innerWidth <= 768) toggleMenu();
        };

        window.excluirConversa = async (id) => {
            if(confirm("Deseja apagar esta conversa?")) {
                await remove(ref(db, `conversas/${usuario}/${id}`));
                if(conversaAtivaId === id) novaConversa();
            }
        };

        function renderizarMensagens() {
            const container = document.getElementById('messages');
            container.innerHTML = "";
            historico.forEach(m => addMsgDOM(m.content, m.role));
        }

        async function enviar() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text || !usuario) return;

            if (!conversaAtivaId) {
                conversaAtivaId = push(ref(db, `conversas/${usuario}`)).key;
            }

            input.value = '';
            addMsgDOM(text, 'user');
            historico.push({ role: "user", content: text });

            // Salva no DB
            await set(ref(db, `conversas/${usuario}/${conversaAtivaId}`), historico);

            try {
                const response = await fetch("/api/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ mensagens: historico.slice(-6) })
                });
                const data = await response.json();
                
                if (data.answer) {
                    addMsgDOM(data.answer, 'ai');
                    historico.push({ role: "assistant", content: data.answer });
                    await set(ref(db, `conversas/${usuario}/${conversaAtivaId}`), historico);
                }
            } catch (e) {
                addMsgDOM("Erro ao conectar com o servidor.", 'ai');
            }
        }

        function addMsgDOM(txt, role) {
            const container = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = `msg-row ${role === 'user' ? 'user' : 'ai'}`;
            div.innerHTML = `
                <div class="msg-label">${role === 'user' ? 'Você' : 'ClassBot'}</div>
                <div class="msg-content">${txt}</div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        document.getElementById('sendBtn').onclick = enviar;
        document.getElementById('userInput').onkeypress = (e) => { if(e.key === 'Enter') enviar(); };
    </script>
</body>
</html>
