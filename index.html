<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ClassBot Oficial</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: #222; 
            color: #e3e3e3; 
            font-family: sans-serif; 
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Título no topo */
        .header { 
            padding: 15px; 
            font-size: 1.4em; 
            font-weight: bold; 
            color: #4facfe; 
            text-align: center;
            border-bottom: 1px solid #333;
        }

        /* Área onde as mensagens aparecem */
        #chat { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px;
        }

        .msg { padding: 12px 16px; border-radius: 18px; max-width: 85%; line-height: 1.4; font-size: 16px; }
        .bot { background: #1a1a1a; align-self: flex-start; border-bottom-left-radius: 2px; }
        .user { background: #333; align-self: flex-end; border-bottom-right-radius: 2px; border: 1px solid #444; }

        /* BARRA DE DIGITAR - Melhorada para aparecer sempre */
        .input-container {
            background: #1a1a1a;
            padding: 15px;
            border-top: 1px solid #333;
        }

        .input-area { 
            background: #333; 
            border-radius: 25px; 
            display: flex; 
            padding: 5px 5px 5px 15px; 
            border: 1px solid #4facfe;
            align-items: center;
        }

        input { 
            flex: 1; 
            background: transparent; 
            border: none; 
            color: white; 
            padding: 12px 0; 
            outline: none; 
            font-size: 16px; /* Evita que o iPhone dê zoom automático */
        }

        button { 
            background: #4facfe; 
            border: none; 
            color: white; 
            width: 45px; 
            height: 45px; 
            border-radius: 50%; 
            cursor: pointer;
            font-size: 1.2em;
            margin-left: 10px;
        }

        .loading { font-size: 0.8em; color: #888; text-align: center; padding: 5px; display: none; }
    </style>
</head>
<body>

    <div class="header">🤖 ClassBot</div>

    <div id="chat">
        <div class="msg bot">Olá! Eu sou o <b>ClassBot</b>. <br><br>Podes digitar a tua pergunta abaixo. Eu vou pesquisar na internet e responder-te aqui mesmo.</div>
    </div>

    <div id="loader" class="loading">ClassBot está a pesquisar...</div>

    <div class="input-container">
        <div class="input-area">
            <input type="text" id="pergunta" placeholder="Escreve aqui a tua pergunta...">
            <button onclick="buscar()">➤</button>
        </div>
    </div>

<script>
    async function buscar() {
        const input = document.getElementById('pergunta');
        const chat = document.getElementById('chat');
        const loader = document.getElementById('loader');
        const texto = input.value.trim();

        if (!texto) return;

        // Mostrar mensagem do utilizador
        chat.innerHTML += `<div class="msg user">${texto}</div>`;
        input.value = "";
        loader.style.display = "block";
        chat.scrollTop = chat.scrollHeight;

        try {
            // API de busca direta para funcionar no telemóvel
            const response = await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(texto)}&format=json&no_html=1`);
            const data = await response.json();
            
            loader.style.display = "none";
            
            let resposta = data.AbstractText;
            
            if (!resposta && data.RelatedTopics && data.RelatedTopics.length > 0) {
                resposta = data.RelatedTopics[0].Text;
            }

            if (!resposta) {
                resposta = "Encontrei resultados, mas não consegui resumir. Tenta perguntar de outra forma!";
            }

            chat.innerHTML += `<div class="msg bot"><b>ClassBot diz:</b><br>${resposta}</div>`;
        } catch (e) {
            loader.style.display = "none";
            chat.innerHTML += `<div class="msg bot">Erro de ligação. Verifica a tua internet.</div>`;
        }
        chat.scrollTop = chat.scrollHeight;
    }

    // Permite enviar ao apertar "Enter" no teclado do telemóvel
    document.getElementById('pergunta').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            buscar();
        }
    });
</script>

</body>
</html>
