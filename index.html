<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ClassBot AI | Classtech</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #007bff; /* Azul vibrante tecnológico */
            --bg: #f8f9fa; /* Fundo claro e limpo */
            --white: #ffffff;
            --txt: #212529;
            --ai-bubble: #e9ecef;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.1);
        }

        * { 
            box-sizing: border-box; 
            font-family: 'Montserrat', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
        }

        body, html { 
            margin: 0; padding: 0; height: 100vh; 
            background: var(--bg); color: var(--txt); 
            display: flex; flex-direction: column;
        }

        /* Header estilo Startup */
        header { 
            padding: 18px; 
            text-align: center; 
            background: var(--white); 
            color: var(--primary); 
            font-weight: 700; 
            font-size: 1.2rem;
            box-shadow: var(--shadow);
            z-index: 10;
        }

        header span { color: #6c757d; font-weight: 400; font-size: 0.9rem; }

        #messages { 
            flex: 1; overflow-y: auto; padding: 20px; 
            display: flex; flex-direction: column; gap: 15px;
            scroll-behavior: smooth;
        }

        .msg { 
            max-width: 80%; padding: 14px 18px; 
            border-radius: 20px; font-size: 15px; 
            line-height: 1.6; position: relative;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        /* Balão do Usuário - Azul FluentGo */
        .user { 
            align-self: flex-end; 
            background: var(--primary); 
            color: var(--white);
            border-bottom-right-radius: 4px;
        }

        /* Balão da IA - Minimalista */
        .ai { 
            align-self: flex-start; 
            background: var(--white); 
            border: 1px solid #dee2e6;
            border-bottom-left-radius: 4px;
        }

        /* Barra de Input Flutuante */
        #input-area { 
            padding: 20px; background: transparent;
        }

        .box { 
            max-width: 700px; margin: 0 auto; display: flex; 
            background: var(--white); border-radius: 50px; 
            padding: 8px 10px 8px 22px; align-items: center;
            box-shadow: var(--shadow);
        }

        input { 
            flex: 1; background: transparent; border: none; 
            color: var(--txt); outline: none; font-size: 16px; 
        }

        button { 
            background: var(--primary); border: none; color: white; 
            width: 45px; height: 45px; border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.2s;
        }

        button:active { transform: scale(0.9); }

        /* Estilização da barra de rolagem */
        #messages::-webkit-scrollbar { width: 4px; }
        #messages::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }
    </style>
</head>
<body>
    <header>ClassBot <span>by Classtech</span></header>
    
    <div id="messages">
        <div class="msg ai">O que você quer agora? Desembucha.</div>
    </div>

    <div id="input-area">
        <div class="box">
            <input type="text" id="userInput" placeholder="Escreva aqui..." autocomplete="off">
            <button id="sendBtn">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
            </button>
        </div>
    </div>

    <script>
        let historico = [];

        async function enviar() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;

            addMsg(text, 'user');
            input.value = '';
            
            historico.push({ role: "user", content: text });

            const aiMsg = addMsg("Pensando...", 'ai');
            scrollDown();

            try {
                const response = await fetch("/api/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ mensagens: historico })
                });
                
                const data = await response.json();
                
                if (data.answer) {
                    aiMsg.innerText = data.answer;
                    historico.push({ role: "assistant", content: data.answer });
                }
            } catch (e) {
                aiMsg.innerText = "Erro na conexão.";
            }
            scrollDown();
        }

        function addMsg(t, s) {
            const d = document.createElement("div");
            d.className = `msg ${s}`;
            d.innerText = t;
            document.getElementById("messages").appendChild(d);
            return d;
        }

        function scrollDown() {
            const m = document.getElementById("messages");
            m.scrollTop = m.scrollHeight;
        }

        document.getElementById('sendBtn').onclick = enviar;
        document.getElementById('userInput').onkeypress = (e) => { if(e.key === 'Enter') enviar(); };
    </script>
</body>
</html>
