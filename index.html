<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ClassBot AI</title>
    <script src="https://unpkg.com/compromise"></script>
    <style>
        :root { --bg: #222; --card: #2d2d2d; --txt: #e3e3e3; --accent: #19c37d; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: var(--bg); color: var(--txt); 
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden; 
        }

        #app-container { display: flex; flex-direction: column; height: 100vh; }

        header { 
            padding: 15px; text-align: center; border-bottom: 1px solid #333; 
            font-weight: bold; color: var(--accent); font-size: 1.2rem;
            background: rgba(34, 34, 34, 0.9);
        }

        #messages { 
            flex: 1; overflow-y: auto; padding: 20px; 
            display: flex; flex-direction: column; gap: 15px;
            scroll-behavior: smooth;
        }
        
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 15px; line-height: 1.5; }
        .user { align-self: flex-end; background: #005fb8; color: white; border-bottom-right-radius: 4px; }
        .ai { align-self: flex-start; background: var(--card); border: 1px solid #3d3d3d; border-bottom-left-radius: 4px; }

        /* Rodapé com Input - Resolvendo o bug do teclado */
        #input-area { 
            padding: 15px; background: var(--bg); 
            border-top: 1px solid #333;
            padding-bottom: env(safe-area-inset-bottom, 15px);
        }
        
        .input-box { 
            max-width: 600px; margin: 0 auto; display: flex; 
            background: #333; border-radius: 25px; padding: 5px 15px; align-items: center;
        }
        
        input { 
            flex: 1; background: transparent; border: none; 
            color: white; padding: 12px; outline: none; font-size: 16px; 
        }
        
        button { 
            background: var(--accent); border: none; color: white; 
            width: 35px; height: 35px; border-radius: 50%; 
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

<div id="app-container">
    <header>ClassBot</header>

    <div id="messages">
        <div class="msg ai">Opa! Eu sou o <b>ClassBot</b>. Falo português do Brasil e rodo direto no seu celular sem travamentos! 🚀</div>
    </div>

    <div id="input-area">
        <div class="input-box">
            <input type="text" id="userInput" placeholder="Mande um 'oi' para o ClassBot...">
            <button onclick="enviar()">↑</button>
        </div>
    </div>
</div>

<script>
    // Lógica de resposta melhorada (NLP Local)
    function obterResposta(texto) {
        const doc = nlp(texto.toLowerCase());
        
        if (doc.has('oi') || doc.has('ola') || doc.has('salve')) {
            return "Fala aí! Como posso te ajudar hoje?";
        }
        if (doc.has('quem e voce') || doc.has('seu nome')) {
            return "Eu sou o ClassBot! Uma IA criada do zero para ser rápida e rodar em qualquer lugar.";
        }
        if (doc.has('roblox') || doc.has('studio')) {
            return "Roblox é massa! Se precisar de ajuda com scripts simples ou ideias de mapas, é só falar.";
        }
        if (doc.has('ajuda') || doc.has('o que faz')) {
            return "Eu posso conversar, tirar dúvidas de programação e funcionar totalmente sem internet!";
        }
        if (doc.has('cor')) {
            return "Minha cor favorita é o verde #19c37d, mas esse fundo #222 ficou elegante, né?";
        }

        return "Entendi! Como eu rodo localmente, ainda estou aprendendo novos assuntos. Pode falar mais sobre isso?";
    }

    function enviar() {
        const input = document.getElementById("userInput");
        const texto = input.value.trim();
        if (!texto) return;

        addMsg(texto, 'user');
        input.value = "";
        
        // Efeito de "digitando"
        const aiMsg = addMsg("...", 'ai');

        setTimeout(() => {
            aiMsg.innerText = obterResposta(texto);
            const box = document.getElementById("messages");
            box.scrollTop = box.scrollHeight;
        }, 500);
    }

    function addMsg(t, s) {
        const d = document.createElement("div");
        d.className = `msg ${s}`;
        d.innerText = t;
        const box = document.getElementById("messages");
        box.appendChild(d);
        box.scrollTop = box.scrollHeight;
        return d;
    }

    // O pulo do gato para o teclado mobile não bugar
    if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', () => {
            document.getElementById('app-container').style.height = window.visualViewport.height + 'px';
            setTimeout(() => {
                document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
            }, 100);
        });
    }
</script>
</body>
</html>
