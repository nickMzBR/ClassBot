<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClassBot - Interface Gemini</title>
    <style>
        /* Reset básico */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: #222; /* Fundo solicitado */
            color: #e3e3e3;
            height: 100vh;
            display: flex;
            justify-content: center;
        }

        /* Container Principal (Layout Centralizado) */
        .main-container {
            width: 100%;
            max-width: 900px; /* Largura confortável para leitura */
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Topo / Header Sutil */
        .header {
            padding: 20px;
            text-align: left;
            font-size: 1.5em;
            font-weight: 500;
            background: linear-gradient(90deg, #6e8efb, #a777e3); /* Gradiente suave no nome */
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: sticky;
            top: 0;
            background-color: #222;
            z-index: 10;
        }

        /* Área de Chat (Scrollable) */
        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px 20px 120px 20px; /* Padding bottom extra para a barra de input */
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Estilização da Scrollbar */
        .chat-box::-webkit-scrollbar { width: 8px; }
        .chat-box::-webkit-scrollbar-track { background: #222; }
        .chat-box::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }

        /* Balões de Mensagem */
        .message {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            max-width: 80%;
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2em;
            flex-shrink: 0;
        }

        .message.bot .avatar { background-color: #333; }
        .message.user .avatar { background-color: #444; }

        .text {
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.5;
            font-size: 0.95em;
        }

        .message.bot .text {
            background-color: #1a1a1a; /* Fundo escuro do chat */
            color: #e3e3e3;
            border-top-left-radius: 4px;
        }

        .message.user .text {
            background-color: #303030; /* Cinza um pouco mais claro */
            color: #e3e3e3;
            border-top-right-radius: 4px;
        }

        /* Texto de "Carregando" */
        .loading {
            font-style: italic;
            color: #888;
            font-size: 0.85em;
            margin-left: 46px; /* Alinhado com o texto do bot */
        }

        /* Barra de Entrada de Texto (Estilo Pílula Gemini) */
        .input-area {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 40px);
            max-width: 700px;
            background-color: #303030;
            border-radius: 30px;
            padding: 5px 10px 5px 20px;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: 1px solid #444;
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: #e3e3e3;
            padding: 10px 0;
            font-size: 1em;
            outline: none;
        }

        input::placeholder { color: #888; }

        button {
            background-color: transparent;
            border: none;
            color: #6e8efb;
            padding: 10px 15px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1em;
            transition: background 0.2s;
        }

        button:hover {
            background-color: rgba(110, 142, 251, 0.1);
        }

    </style>
</head>
<body>

<div class="main-container">
    <div class="header">ClassBot</div>

    <div class="chat-box" id="chatBox">
        <div class="message bot">
            <div class="avatar">🤖</div>
            <div class="text">Olá! Eu sou o ClassBot. Digite sua pergunta abaixo e eu pesquisarei em várias fontes do Google para te dar a melhor resposta.</div>
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Faça uma pergunta ao ClassBot..." onkeypress="handleKeyPress(event)">
        <button onclick="enviarPergunta()">➤</button>
    </div>
</div>

<script>
    function handleKeyPress(event) {
        if (event.key === 'Enter') {
            enviarPergunta();
        }
    }

    function enviarPergunta() {
        const input = document.getElementById('userInput');
        const chatBox = document.getElementById('chatBox');
        const question = input.value.trim();
        
        if(question !== "") {
            // 1. Adicionar mensagem do usuário
            chatBox.innerHTML += `
                <div class="message user">
                    <div class="avatar">👤</div>
                    <div class="text">${question}</div>
                </div>
            `;
            
            // 2. Adicionar indicador de carregamento
            const loadingId = 'loading-' + Date.now();
            chatBox.innerHTML += `
                <p class="loading" id="${loadingId}">O ClassBot está analisando várias fontes...</p>
            `;
            
            // Limpar input e rolar para baixo
            input.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;

            // 3. Simular resposta (isso será substituído pela lógica real depois)
            setTimeout(() => {
                // Remover o loading
                const loadingEl = document.getElementById(loadingId);
                if (loadingEl) loadingEl.remove();

                // Adicionar resposta do bot
                chatBox.innerHTML += `
                    <div class="message bot">
                        <div class="avatar">🤖</div>
                        <div class="text">
                            Entendi. Você perguntou sobre <strong>"${question}"</strong>.<br><br>
                            Em uma implementação real, eu usaria a Google Search API agora para ler os top 5 resultados e resumir as informações aqui para você. Como ainda somos um protótipo HTML, esta é uma resposta simulada.
                        </div>
                    </div>
                `;
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 2500); // Simula 2.5 segundos de pesquisa
        }
    }
</script>

</body>
</html>
