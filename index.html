<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ClassBot V0.7</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #222; color: #e3e3e3; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; }
        .header { padding: 15px; font-size: 1.4em; font-weight: bold; color: #4facfe; text-align: center; border-bottom: 1px solid #333; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 12px 16px; border-radius: 18px; max-width: 85%; line-height: 1.5; font-size: 15px; }
        .bot { background: #1a1a1a; align-self: flex-start; border: 1px solid #333; border-bottom-left-radius: 2px; }
        .user { background: #333; align-self: flex-end; border: 1px solid #444; border-bottom-right-radius: 2px; }
        .loader { font-size: 0.8em; color: #4facfe; text-align: center; display: none; padding: 10px; }
        .input-container { background: #1a1a1a; padding: 15px; border-top: 1px solid #333; }
        .input-area { background: #333; border-radius: 25px; display: flex; padding: 5px 15px; border: 1px solid #444; align-items: center; max-width: 700px; margin: 0 auto; }
        textarea { flex: 1; background: transparent; border: none; color: white; padding: 12px 0; outline: none; font-size: 16px; resize: none; height: 45px; }
        button { background: #4facfe; border: none; color: white; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; margin-left: 10px; flex-shrink: 0; }
    </style>
</head>
<body>

    <div class="header">🤖 ClassBot</div>
    <div id="chat">
        <div class="msg bot">Olá! Sou o ClassBot. Pesquiso na web e te dou o resumo, como o Google Assistente. O que quer saber?</div>
    </div>
    <div id="loading" class="loader">Consultando a internet...</div>

    <div class="input-container">
        <div class="input-area">
            <textarea id="pergunta" placeholder="Pergunte qualquer coisa..."></textarea>
            <button onclick="buscar()">➤</button>
        </div>
    </div>

<script>
    async function buscar() {
        const input = document.getElementById('pergunta');
        const chat = document.getElementById('chat');
        const loader = document.getElementById('loading');
        const query = input.value.trim();

        if (!query) return;

        chat.innerHTML += `<div class="msg user">${query}</div>`;
        input.value = "";
        loader.style.display = "block";
        chat.scrollTop = chat.scrollHeight;

        try {
            // Usando a API do DuckDuckGo que fornece respostas prontas (Instant Answers)
            // É a forma mais próxima do Google Assistente sem precisar de chaves
            const url = `https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_html=1&skip_disambig=1`;
            
            const response = await fetch(url);
            const data = await response.json();
            
            loader.style.display = "none";
            
            let resposta = "";

            if (data.AbstractText) {
                // Se houver um resumo direto (igual ao Google)
                resposta = data.AbstractText;
            } else if (data.RelatedTopics && data.RelatedTopics.length > 0) {
                // Se não, pega a primeira descrição relacionada
                resposta = data.RelatedTopics[0].Text;
            } else {
                // Se o buscador não der texto curto, ele sugere uma busca externa
                resposta = "Encontrei resultados na web, mas não há um resumo direto disponível. Tente reformular como 'O que é...' ou 'Quem foi...'";
            }

            chat.innerHTML += `<div class="msg bot"><b>Resultado da busca:</b><br>${resposta}</div>`;

        } catch (e) {
            loader.style.display = "none";
            chat.innerHTML += `<div class="msg bot">Erro de conexão. Verifique sua internet.</div>`;
        }
        chat.scrollTop = chat.scrollHeight;
    }

    document.getElementById('pergunta').addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = (this.scrollHeight) + 'px';
    });
</script>

</body>
</html>
