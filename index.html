<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ClassBot Pro</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #222; color: #e3e3e3; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; }
        .header { padding: 15px; font-size: 1.4em; font-weight: bold; color: #4facfe; text-align: center; border-bottom: 1px solid #333; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 12px 16px; border-radius: 18px; max-width: 85%; line-height: 1.5; font-size: 15px; word-wrap: break-word; }
        .bot { background: #1a1a1a; align-self: flex-start; border: 1px solid #333; border-bottom-left-radius: 2px; }
        .user { background: #333; align-self: flex-end; border: 1px solid #444; border-bottom-right-radius: 2px; }
        .loader { font-size: 0.8em; color: #4facfe; text-align: center; display: none; padding: 10px; }
        .input-container { background: #1a1a1a; padding: 15px; border-top: 1px solid #333; }
        .input-area { background: #333; border-radius: 25px; display: flex; padding: 5px 15px; border: 1px solid #444; align-items: center; max-width: 700px; margin: 0 auto; }
        textarea { flex: 1; background: transparent; border: none; color: white; padding: 10px 0; outline: none; font-size: 16px; resize: none; height: 45px; font-family: inherit; }
        button { background: #4facfe; border: none; color: white; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; margin-left: 10px; flex-shrink: 0; }
    </style>
</head>
<body>

    <div class="header">🤖 ClassBot Pro</div>
    <div id="chat">
        <div class="msg bot">Olá! Sou o <b>ClassBot</b>. Ajustei meus circuitos para aguentar perguntas longas e textos de provas. O que vamos resolver?</div>
    </div>
    <div id="loading" class="loader">ClassBot analisando dados...</div>

    <div class="input-container">
        <div class="input-area">
            <textarea id="pergunta" placeholder="Cole sua questão complexa aqui..."></textarea>
            <button onclick="buscar()">➤</button>
        </div>
    </div>

<script>
    async function buscar() {
        const input = document.getElementById('pergunta');
        const chat = document.getElementById('chat');
        const loader = document.getElementById('loading');
        const query = input.value.trim();

        if (!query) return;

        chat.innerHTML += `<div class="msg user">${query}</div>`;
        input.value = "";
        input.style.height = "45px";
        loader.style.display = "block";
        chat.scrollTop = chat.scrollHeight;

        try {
            // Se a pergunta for muito longa, pegamos apenas as primeiras palavras-chave para a busca não travar
            const buscaSimplificada = query.length > 50 ? query.substring(0, 60) : query;
            
            // Usando o buscador da Wikipedia que é o mais estável para textos longos
            const url = `https://pt.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(buscaSimplificada.split(' ')[0])}`;
            
            const response = await fetch(url);
            if (!response.ok) throw new Error();
            const data = await response.json();
            
            loader.style.display = "none";
            
            let resposta = "";
            if (data.extract) {
                resposta = `<b>Análise:</b><br>${data.extract}`;
            } else {
                resposta = "Consegui processar a pergunta, mas não há um resumo direto. Tente focar no termo principal (ex: se for sobre advérbios, digite apenas 'Advérbios').";
            }

            chat.innerHTML += `<div class="msg bot">${resposta}</div>`;

        } catch (e) {
            loader.style.display = "none";
            // Se der erro de conexão, o ClassBot tenta uma busca alternativa automática
            chat.innerHTML += `<div class="msg bot"><b>Dica do ClassBot:</b> Para questões de múltipla escolha muito longas, tente colar apenas o conceito principal para eu encontrar a definição exata!</div>`;
        }
        chat.scrollTop = chat.scrollHeight;
    }

    document.getElementById('pergunta').addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = (this.scrollHeight > 150 ? 150 : this.scrollHeight) + 'px';
    });
</script>

</body>
</html>
